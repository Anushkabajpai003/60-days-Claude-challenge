<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
  :root{
    --vault-black:#0b1210;
    --vault-panel:#101a17;
    --vault-cork:#14201b;
    --emerald:#1f9d6f;
    --emerald-bright:#2fe39a;
    --emerald-dim:#0f4a35;
    --gold:#c9a24b;
    --paper:#efe6cf;
    --paper-dark:#e0d3ab;
    --ink:#20241f;
    --text-main:#dce9e2;
    --text-dim:#8fa79c;
    --danger:#c85a4a;
    --shadow-deep: 0 20px 50px rgba(0,0,0,.55);
    --font-display:'Special Elite', 'Courier New', monospace;
    --font-body: Georgia, 'Times New Roman', serif;
    --font-ui: 'Trebuchet MS', Verdana, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #16241e 0%, var(--vault-black) 60%),
      var(--vault-black);
    color:var(--text-main);
    font-family:var(--font-ui);
    min-height:100vh;
    overflow-x:hidden;
  }
  /* subtle vignette + film grain */
  body::before{
    content:"";
    position:fixed; inset:0;
    background:
      radial-gradient(circle at 50% 0%, rgba(47,227,154,0.05), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 2px, transparent 4px);
    pointer-events:none;
    z-index:9999;
  }
  ::-webkit-scrollbar{width:10px;}
  ::-webkit-scrollbar-track{background:var(--vault-black);}
  ::-webkit-scrollbar-thumb{background:var(--emerald-dim);border-radius:6px;}

  h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:.5px;margin:0;}
  a{color:inherit;}

  .app{max-width:1200px;margin:0 auto;padding:24px 20px 80px;}

  /* ---------- Top Bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;margin-bottom:28px;
    background:linear-gradient(180deg, #132420, #0c1815);
    border:1px solid var(--emerald-dim);
    border-radius:10px;
    box-shadow:var(--shadow-deep), inset 0 0 30px rgba(47,227,154,0.03);
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-badge{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--emerald-bright), var(--emerald-dim) 70%);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display); font-weight:bold; color:#06130d;
    box-shadow:0 0 18px rgba(47,227,154,.5);
    flex-shrink:0;
  }
  .brand h1{font-size:1.35rem;color:var(--emerald-bright); text-shadow:0 0 12px rgba(47,227,154,.35);}
  .brand span{display:block;font-size:.68rem;color:var(--text-dim);letter-spacing:2px;font-family:var(--font-ui);}
  .case-tag{
    font-family:var(--font-display);
    font-size:.85rem;color:var(--gold);
    border:1px dashed var(--gold);
    padding:6px 12px;border-radius:6px;
    background:rgba(201,162,75,0.06);
  }

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--font-ui); font-weight:600;
    border:none; cursor:pointer; border-radius:8px;
    padding:12px 22px; font-size:.95rem;
    color:#06140e; letter-spacing:.3px;
    background:linear-gradient(180deg, var(--emerald-bright), var(--emerald));
    box-shadow:0 6px 18px rgba(47,227,154,.25), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(47,227,154,.4); filter:brightness(1.05);}
  .btn:active{transform:translateY(0px) scale(.98);}
  .btn.secondary{
    background:transparent;color:var(--text-main);
    border:1px solid var(--emerald-dim);
    box-shadow:none;
  }
  .btn.secondary:hover{border-color:var(--emerald-bright); color:var(--emerald-bright); box-shadow:0 0 14px rgba(47,227,154,.15);}
  .btn.danger{background:linear-gradient(180deg,#e07a63,#c85a4a);}
  .btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}

  /* ---------- Screens ---------- */
  .screen{animation:fadeIn .5s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

  /* ---------- INTRO / THEME SELECT ---------- */
  .intro{
    text-align:center; padding:60px 20px; position:relative;
  }
  .intro h1.title{
    font-size:clamp(2.2rem, 6vw, 3.6rem);
    color:var(--emerald-bright);
    text-shadow:0 0 25px rgba(47,227,154,.4);
    margin-bottom:8px;
  }
  .intro .sub{color:var(--text-dim); font-size:1rem; margin-bottom:40px; font-family:var(--font-body); font-style:italic;}
  .lantern{
    width:90px;height:90px;margin:0 auto 20px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(47,227,154,.9), rgba(47,227,154,0) 70%);
    filter:blur(2px);
    animation:pulse 3s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:.5; transform:scale(1);} 50%{opacity:1; transform:scale(1.12);}}

  .file-cabinet{
    display:flex; justify-content:center; margin-top:20px;
  }

  /* ---------- CASE ASSIGNMENT ---------- */
  .folder{
    max-width:720px;margin:0 auto;
    background:linear-gradient(180deg,#16241f,#0d1815);
    border:1px solid var(--emerald-dim);
    border-radius:12px;
    padding:34px;
    box-shadow:var(--shadow-deep);
    position:relative;
  }
  .folder::before{
    content:"CONFIDENTIAL";
    position:absolute; top:14px; right:-38px;
    background:var(--danger); color:#1a0a08;
    font-family:var(--font-display); font-size:.7rem;
    padding:4px 40px; transform:rotate(35deg);
    letter-spacing:2px; box-shadow:0 3px 8px rgba(0,0,0,.4);
  }
  .folder h2{color:var(--gold); font-size:1.6rem; margin-bottom:6px;}
  .folder .meta-row{display:flex; gap:14px; flex-wrap:wrap; margin:14px 0 20px;}
  .meta-chip{
    background:rgba(47,227,154,.08); border:1px solid var(--emerald-dim);
    color:var(--text-main); padding:6px 12px; border-radius:20px; font-size:.82rem;
  }
  .briefing-text{
    font-family:var(--font-body); line-height:1.7; color:var(--text-main); font-size:1.02rem;
    border-left:3px solid var(--emerald-dim); padding-left:16px; margin-bottom:22px;
  }
  .stamp{
    display:inline-block; border:3px solid var(--danger); color:var(--danger);
    padding:6px 14px; border-radius:6px; font-family:var(--font-display);
    transform:rotate(-6deg); font-size:1rem; letter-spacing:2px; opacity:.85;
    margin-bottom:16px;
  }

  /* ---------- INVESTIGATION BOARD ---------- */
  .board-wrap{position:relative;}
  .corkboard{
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.03), transparent 40%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,.02), transparent 40%),
      repeating-radial-gradient(circle at 10% 10%, rgba(0,0,0,0.06) 0, rgba(0,0,0,0.06) 2px, transparent 3px, transparent 12px),
      #3d2c1e;
    background-blend-mode:overlay;
    border-radius:14px;
    border:10px solid #241a12;
    box-shadow:var(--shadow-deep), inset 0 0 60px rgba(0,0,0,.5);
    padding:26px;
    min-height:520px;
    position:relative;
  }
  .board-title{
    text-align:center; color:var(--emerald-bright); margin-bottom:18px;
    text-shadow:0 0 10px rgba(47,227,154,.4);
  }
  .board-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px,1fr));
    gap:22px;
  }
  .note{
    position:relative;
    background:var(--paper);
    color:var(--ink);
    padding:18px 16px 20px;
    border-radius:2px;
    font-family:var(--font-body);
    box-shadow:0 10px 20px rgba(0,0,0,.45), 0 2px 0 rgba(255,255,255,.15) inset;
    cursor:grab;
    transition:transform .2s ease, box-shadow .2s ease;
    transform:rotate(var(--rot,-2deg));
    user-select:none;
  }
  .note:nth-child(odd){--rot:-2deg;}
  .note:nth-child(even){--rot:2deg;}
  .note:nth-child(3n){--rot:-1deg;}
  .note.folded{background:var(--paper-dark);}
  .note:hover{transform:rotate(0deg) scale(1.035) translateY(-4px); box-shadow:0 18px 30px rgba(0,0,0,.6); z-index:5;}
  .note.dragging{opacity:.55; cursor:grabbing; z-index:20;}
  .note.investigated{
    box-shadow:0 10px 20px rgba(0,0,0,.45), 0 0 0 2px var(--emerald-bright), 0 0 20px rgba(47,227,154,.4);
  }
  .pin{
    position:absolute; top:-10px; left:50%; transform:translateX(-50%);
    width:16px; height:16px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff8f7a, #c0392b 70%);
    box-shadow:0 3px 6px rgba(0,0,0,.5);
  }
  .note h4{font-family:var(--font-display); font-size:.95rem; color:#3a2b16; margin-bottom:8px; border-bottom:1px dashed #9c8a63; padding-bottom:6px;}
  .note p{margin:0; font-size:.88rem; line-height:1.5;}
  .note .tag{
    display:inline-block; margin-top:10px; font-size:.68rem; letter-spacing:1px;
    color:#6b5a34; font-family:var(--font-ui); text-transform:uppercase;
  }
  .note .unlock-hint{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(20,20,20,.82); color:var(--emerald-bright); border-radius:2px;
    font-family:var(--font-display); font-size:.85rem; text-align:center; padding:10px;
    opacity:1; transition:opacity .3s ease;
  }
  .note.revealed .unlock-hint{display:none;}

  .string-svg{position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1;}

  .progress-wrap{
    margin:20px 0; background:#0c1613; border-radius:20px; border:1px solid var(--emerald-dim);
    height:18px; overflow:hidden; position:relative;
  }
  .progress-fill{
    height:100%; background:linear-gradient(90deg, var(--emerald-dim), var(--emerald-bright));
    box-shadow:0 0 12px rgba(47,227,154,.6);
    transition:width .5s ease;
  }
  .progress-label{
    text-align:center; font-size:.78rem; color:var(--text-dim); margin-top:6px; letter-spacing:1px;
  }

  /* ---------- data panel that appears after clicking a note ---------- */
  .dossier{
    margin-top:26px;
    background:linear-gradient(180deg,#132420,#0d1815);
    border:1px solid var(--emerald-dim); border-radius:12px;
    padding:24px; box-shadow:var(--shadow-deep);
    animation:fadeIn .4s ease;
  }
  .dossier h3{color:var(--gold); margin-bottom:14px; font-size:1.15rem;}
  .metric-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin:16px 0;
  }
  .metric-box{
    background:rgba(47,227,154,.06); border:1px solid var(--emerald-dim); border-radius:8px;
    padding:12px; text-align:center;
  }
  .metric-box .val{font-family:var(--font-display); font-size:1.3rem; color:var(--emerald-bright);}
  .metric-box .lab{font-size:.72rem; color:var(--text-dim); letter-spacing:1px; margin-top:4px;}
  .bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
  .bar-row .lab{width:110px; font-size:.8rem; color:var(--text-dim); flex-shrink:0;}
  .bar-track{flex:1; background:#0c1613; border-radius:6px; height:14px; overflow:hidden; border:1px solid var(--emerald-dim);}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--emerald-dim),var(--emerald-bright)); width:0%; transition:width 1.1s cubic-bezier(.2,.9,.3,1); box-shadow:0 0 8px rgba(47,227,154,.5);}
  .comment{
    background:rgba(255,255,255,.03); border-left:3px solid var(--gold); padding:10px 14px; margin-bottom:8px;
    font-style:italic; font-family:var(--font-body); font-size:.92rem; border-radius:0 6px 6px 0;
  }

  /* ---------- SOLVE THE CASE ---------- */
  .solve-panel{
    max-width:820px;margin:0 auto;
    background:linear-gradient(180deg,#16241f,#0d1815);
    border:1px solid var(--emerald-dim); border-radius:12px; padding:30px;
    box-shadow:var(--shadow-deep);
  }
  .solve-panel h2{color:var(--emerald-bright); margin-bottom:6px;}
  .solve-sub{color:var(--text-dim); margin-bottom:20px; font-family:var(--font-body); font-style:italic;}
  .option-list{display:flex; flex-direction:column; gap:12px;}
  .option{
    text-align:left; padding:16px 18px; border-radius:8px; cursor:pointer;
    background:rgba(255,255,255,.02); border:1px solid var(--emerald-dim);
    color:var(--text-main); font-family:var(--font-body); font-size:.98rem;
    transition:all .2s ease; position:relative;
  }
  .option:hover{border-color:var(--emerald-bright); background:rgba(47,227,154,.06); transform:translateX(4px);}
  .option.selected{border-color:var(--gold); box-shadow:0 0 14px rgba(201,162,75,.3);}
  .option.correct{border-color:var(--emerald-bright); background:rgba(47,227,154,.14); box-shadow:0 0 20px rgba(47,227,154,.4);}
  .option.wrong{border-color:var(--danger); background:rgba(200,90,74,.14);}
  .option .letter{
    display:inline-block; width:26px; height:26px; border-radius:50%; text-align:center; line-height:26px;
    background:var(--emerald-dim); color:var(--emerald-bright); font-family:var(--font-display); font-size:.8rem;
    margin-right:10px;
  }

  /* ---------- CASE CLOSED ---------- */
  .case-closed-overlay{
    position:fixed; inset:0; background:rgba(4,10,8,.9); display:flex;
    align-items:center; justify-content:center; z-index:200; animation:fadeIn .3s ease;
  }
  .stamp-anim{
    font-family:var(--font-display); font-size:clamp(2.4rem,8vw,5rem); color:var(--emerald-bright);
    border:8px solid var(--emerald-bright); border-radius:14px; padding:20px 50px;
    transform:rotate(-8deg) scale(0.4); opacity:0;
    text-shadow:0 0 30px rgba(47,227,154,.7);
    box-shadow:0 0 60px rgba(47,227,154,.5);
    animation:stampIn .6s cubic-bezier(.2,1.4,.5,1) forwards;
    letter-spacing:4px;
  }
  @keyframes stampIn{
    0%{transform:rotate(-8deg) scale(2.2); opacity:0;}
    60%{transform:rotate(-8deg) scale(0.9); opacity:1;}
    100%{transform:rotate(-8deg) scale(1); opacity:1;}
  }

  /* ---------- LEARNING REPORT ---------- */
  .report{
    max-width:820px;margin:0 auto;
    background:linear-gradient(180deg,#16241f,#0d1815);
    border:1px solid var(--emerald-dim); border-radius:12px; padding:32px;
    box-shadow:var(--shadow-deep);
  }
  .report h2{color:var(--gold); margin-bottom:4px;}
  .report .score-line{color:var(--emerald-bright); font-family:var(--font-display); font-size:1.1rem; margin:10px 0 24px;}
  .report-section{margin-bottom:22px;}
  .report-section h4{color:var(--emerald-bright); font-size:.95rem; letter-spacing:1px; margin-bottom:8px; text-transform:uppercase;}
  .report-section p, .report-section li{font-family:var(--font-body); line-height:1.7; color:var(--text-main);}
  .improve-list{padding-left:20px;}
  .improve-list li{margin-bottom:6px;}
  .btn-row{display:flex; gap:14px; justify-content:center; margin-top:30px; flex-wrap:wrap;}

  /* misc */
  .center{text-align:center;}
  .footer-note{text-align:center; color:var(--text-dim); font-size:.75rem; margin-top:40px; letter-spacing:1px;}
  .hidden{display:none !important;}

  @media (max-width:600px){
    .folder::before{display:none;}
    .board-grid{grid-template-columns:1fr 1fr;}
    .topbar{flex-direction:column; gap:10px; align-items:flex-start;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* =========================================================
   MARKETING DETECTIVE — vanilla JS single-file app
   ========================================================= */

/* ---------------- THEME (Emerald Vault, already chosen) ---------------- */
/* Palette baked into CSS variables above. */

/* ---------------- CASE DATA ---------------- */
const CASES = [
{
  company:"Lumen & Loom", industry:"Sustainable Home Goods",
  objective:"Drive first-time purchases for a new 'zero-waste' candle line via a 6-week paid social push.",
  audience:"Eco-conscious millennials, ages 26–40, urban apartment dwellers, mid-to-high disposable income.",
  channels:["Instagram Ads","TikTok Ads","Influencer Seeding","Email Newsletter"],
  budget:{"Instagram Ads":40,"TikTok Ads":30,"Influencer Seeding":20,"Email Newsletter":10},
  metrics:{reach:"1.2M", ctr:"0.42%", engagement:"3.1%", conversions:"612", sales:"$18,360"},
  comments:[
    "\"The ad looked gorgeous but the site took forever to load on my phone.\"",
    "\"I clicked three times before I found the 'buy' button.\"",
    "\"Loved the influencer video, but the checkout page felt like a different, cheaper brand.\""
  ],
  social:{likesTrend:[40,55,70,60,90,120], shareOfVoice:"Rising, +18% week over week", sentiment:"68% positive, 22% neutral, 10% negative"},
  mistake:"The landing page was not mobile-optimized, causing a massive drop-off between ad click and checkout despite strong top-of-funnel engagement.",
  clues:[
    "CTR (0.42%) is healthy for the industry, meaning the creative and targeting worked.",
    "Conversions (612) are far below what reach and CTR would predict for this category.",
    "Multiple customer comments specifically mention slow mobile load times and confusing checkout."
  ],
  explanation:"The campaign successfully captured attention and interest (strong reach, solid CTR, positive sentiment), but a broken mobile experience — slow load times and a disjointed checkout — caused otherwise interested buyers to abandon before purchase. The mistake lived in the conversion funnel, not the ad creative or targeting.",
  improvements:[
    "Run a mobile page-speed audit and compress hero images/video before the next flight.",
    "Simplify checkout to 2 steps max and ensure visual consistency between ad and landing page.",
    "A/B test a lighter 'quick-buy' landing page against the full brand site."
  ]
},
{
  company:"CrestBank Direct", industry:"Digital Banking",
  objective:"Increase sign-ups for a new no-fee checking account among young professionals.",
  audience:"Recent graduates and early-career professionals, 22–29, first banking relationship of their own.",
  channels:["YouTube Pre-Roll","Search Ads","Reddit Ads","Referral Program"],
  budget:{"YouTube Pre-Roll":35,"Search Ads":35,"Reddit Ads":15,"Referral Program":15},
  metrics:{reach:"2.4M", ctr:"1.1%", engagement:"2.4%", conversions:"3,140", sales:"N/A (Sign-ups)"},
  comments:[
    "\"I signed up but three of my friends said the referral link just gave them an error.\"",
    "\"Great ad, but I had no idea what 'no-fee' actually meant until I read the fine print.\"",
    "\"I tried to refer my roommate and never got my bonus.\""
  ],
  social:{likesTrend:[80,95,100,110,90,88], shareOfVoice:"Flat, -2% week over week", sentiment:"54% positive, 30% neutral, 16% negative"},
  mistake:"The referral program's tracking links were broken for a significant portion of the campaign, causing lost referral conversions and eroding trust when bonuses weren't credited.",
  clues:[
    "Referral Program received a meaningful budget share (15%) but organic word-of-mouth chatter about it is negative.",
    "Sign-up numbers plateaued in the exact week the referral push was scheduled to accelerate growth.",
    "Repeated, specific customer complaints cite broken referral links and missing bonuses — a technical, not creative, issue."
  ],
  explanation:"The core acquisition channels (Search, YouTube) performed as expected, but the referral program — meant to compound growth through word-of-mouth — had broken tracking links, so referred sign-ups weren't credited. This created a silent leak in the funnel and actively damaged trust among the brand's most enthusiastic advocates.",
  improvements:[
    "QA every referral link and bonus-crediting flow before launch, with automated monitoring.",
    "Set up real-time alerts for referral conversion anomalies during the campaign.",
    "Proactively make good on missed bonuses to rebuild trust with early referrers."
  ]
},
{
  company:"Northfield Outfitters", industry:"Outdoor Apparel",
  objective:"Launch a new waterproof jacket line ahead of the fall hiking season.",
  audience:"Active outdoor enthusiasts, 25–55, weekend hikers and campers across colder climates.",
  channels:["Print Catalog","Facebook Ads","Retail Partnerships","Search Ads"],
  budget:{"Print Catalog":30,"Facebook Ads":25,"Retail Partnerships":30,"Search Ads":15},
  metrics:{reach:"850K", ctr:"0.65%", engagement:"1.8%", conversions:"1,020", sales:"$142,000"},
  comments:[
    "\"Beautiful catalog, but by the time I looked online the jacket I wanted was already out of stock.\"",
    "\"Every store near me sold out in a week — wish I'd known before driving out.\"",
    "\"Loved the ad, hated that I couldn't actually buy it anywhere for two weeks.\""
  ],
  social:{likesTrend:[30,45,60,110,140,70], shareOfVoice:"Spiked then dropped sharply", sentiment:"61% positive, 19% neutral, 20% negative"},
  mistake:"Demand forecasting failed to anticipate the response to the catalog and retail push, leading to widespread stockouts that turned excited buyers into frustrated ones mid-campaign.",
  clues:[
    "Social engagement spiked sharply in week 4, then dropped just as fast — unusual for a campaign still running.",
    "Sales are strong early but conversions stall in the back half despite continued ad spend.",
    "Comments consistently reference stockouts and being unable to find the product in-store or online."
  ],
  explanation:"The campaign generated real demand — arguably more than expected — but inventory planning didn't scale with the marketing push. Stockouts mid-campaign meant paid media kept driving traffic to a product that wasn't available, wasting spend and generating frustration precisely when momentum was highest.",
  improvements:[
    "Align inventory planning with projected campaign reach before launch, not after early results.",
    "Add real-time stock indicators to ads and pause spend on out-of-stock SKUs automatically.",
    "Offer a 'notify me' waitlist to capture demand during stockouts instead of losing it."
  ]
},
{
  company:"PulseFit Studios", industry:"Fitness & Wellness",
  objective:"Fill new member slots for a limited-time New Year's membership promotion.",
  audience:"Health-motivated adults, 20–45, seeking New Year resolution memberships.",
  channels:["Instagram Ads","Local Radio","SMS Marketing","Referral Program"],
  budget:{"Instagram Ads":35,"Local Radio":20,"SMS Marketing":25,"Referral Program":20},
  metrics:{reach:"410K", ctr:"1.8%", engagement:"4.2%", conversions:"890", sales:"$97,900"},
  comments:[
    "\"I signed up for the trial but got charged the full membership fee immediately.\"",
    "\"The SMS texts came at like 6am, kind of annoying.\"",
    "\"Front desk staff seemed confused when I mentioned the promo — had to explain it to them.\""
  ],
  social:{likesTrend:[60,90,130,120,100,95], shareOfVoice:"Strong early spike, steady after", sentiment:"58% positive, 24% neutral, 18% negative"},
  mistake:"Internal staff were not briefed on the promotion's specific terms, leading to billing errors and inconsistent in-person messaging that undercut an otherwise well-targeted campaign.",
  clues:[
    "Digital metrics (CTR, engagement) are strong, showing the offer and creative resonated with the audience.",
    "Complaints cluster around what happens *after* sign-up — billing and front-desk experience — not the ads themselves.",

/* ---------------- STATE ---------------- */
let state = {
  screen:'intro', // intro -> assignment -> board -> solve -> closed -> report
  currentCase:null,
  investigated:new Set(), // indices of notes clicked
  activeNoteIndex:null,
  selectedAnswer:null,
  answered:false,
  score:0
};

const NOTE_DEFS = [
  {key:'objective', title:'Campaign Objective', unlockAt:0},
  {key:'audience', title:'Target Audience', unlockAt:0},
  {key:'channels', title:'Marketing Channels', unlockAt:0},
  {key:'budget', title:'Budget Allocation', unlockAt:0},
  {key:'metrics', title:'Campaign Metrics', unlockAt:0},
  {key:'comments', title:'Customer Comments', unlockAt:0},
  {key:'social', title:'Social Performance', unlockAt:0},
  {key:'clues', title:'Supporting Clues', unlockAt:0},
];

function pickRandomCase(){
  const idx = Math.floor(Math.random()*CASES.length);
  return CASES[idx];
}

/* ---------------- RENDER ROOT ---------------- */
const app = document.getElementById('app');

function render(){
  app.innerHTML = '';
  app.appendChild(TopBar());
  let body;
  switch(state.screen){
    case 'intro': body = IntroScreen(); break;
    case 'assignment': body = AssignmentScreen(); break;
    case 'board': body = BoardScreen(); break;
    case 'solve': body = SolveScreen(); break;
    case 'report': body = ReportScreen(); break;
    default: body = IntroScreen();
  }
  app.appendChild(body);
  if(state.screen === 'board'){ requestAnimationFrame(drawStrings); }
}

/* ---------------- TOP BAR ---------------- */
function TopBar(){
  const bar = el('div','topbar');
  const brand = el('div','brand');
  brand.innerHTML = `<div class="brand-badge">MD</div>
    <div><h1>Marketing Detective</h1><span>CASE FILES DIVISION</span></div>`;
  bar.appendChild(brand);
  if(state.currentCase){
    const tag = el('div','case-tag', `CASE FILE: ${state.currentCase.company.toUpperCase()}`);
    bar.appendChild(tag);
  }
  return bar;
}

/* ---------------- INTRO ---------------- */
function IntroScreen(){
  const wrap = el('div','screen intro');
  wrap.innerHTML = `
    <div class="lantern"></div>
    <h1 class="title">MARKETING DETECTIVE</h1>
    <p class="sub">"Every campaign leaves a trail. Find where it went cold."</p>
  `;
  const btn = el('button','btn','Open a New Case File');
  btn.style.fontSize='1.05rem';
  btn.style.padding='16px 34px';
  btn.onclick = () => {
    state.currentCase = pickRandomCase();
    state.investigated = new Set();
    state.activeNoteIndex = null;
    state.selectedAnswer = null;
    state.answered = false;
    state.screen = 'assignment';
    render();
  };
  wrap.appendChild(btn);

  const footer = el('div','footer-note', 'Emerald Vault Edition · A case-solving marketing literacy game');
  wrap.appendChild(footer);
  return wrap;
}

/* ---------------- ASSIGNMENT ---------------- */
function AssignmentScreen(){
  const c = state.currentCase;
  const wrap = el('div','screen');
  const folder = el('div','folder');
  folder.innerHTML = `
    <div class="stamp">CASE ASSIGNED</div>
    <h2>${c.company}</h2>
    <div class="meta-row">
      <span class="meta-chip">Industry: ${c.industry}</span>
    </div>
    <p class="briefing-text">
      Detective, you've been assigned a curious file. <strong>${c.company}</strong> ran a marketing campaign
      that didn't perform the way it should have. Somewhere in the metrics, the comments, and the channel mix,
      a single mistake is hiding — and it's your job to find it.
      <br><br>
      Objective on record: <em>${c.objective}</em>
    </p>
  `;
  const btnRow = el('div','btn-row');
  const startBtn = el('button','btn','Head to the Investigation Board →');
  startBtn.onclick = () => { state.screen = 'board'; render(); };
  btnRow.appendChild(startBtn);
  folder.appendChild(btnRow);
  wrap.appendChild(folder);
  return wrap;
}

/* ---------------- BOARD ---------------- */
function BoardScreen(){
  const c = state.currentCase;
  const wrap = el('div','screen board-wrap');

  const progressPct = Math.round((state.investigated.size / NOTE_DEFS.length) * 100);
  const progWrap = el('div');
  progWrap.innerHTML = `
    <div class="progress-wrap"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="progress-label">EVIDENCE COLLECTED: ${state.investigated.size} / ${NOTE_DEFS.length}</div>
  `;
  wrap.appendChild(progWrap);

  const cork = el('div','corkboard');
  cork.innerHTML = `<h3 class="board-title">🔎 THE INVESTIGATION BOARD</h3>`;
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','string-svg');
  svg.setAttribute('id','string-svg');
  cork.appendChild(svg);

  const grid = el('div','board-grid');
  grid.id = 'board-grid';
  NOTE_DEFS.forEach((def, i) => {
    grid.appendChild(NoteCard(def, i));
  });
  cork.appendChild(grid);
  wrap.appendChild(cork);

  if(state.activeNoteIndex !== null){
    wrap.appendChild(Dossier(NOTE_DEFS[state.activeNoteIndex]));
  }

  const btnRow = el('div','btn-row');
  const solveBtn = el('button','btn', state.investigated.size >= 4 ? "I'm Ready to Solve the Case →" : `Investigate at least ${4 - state.investigated.size} more note(s)`);
  solveBtn.disabled = state.investigated.size < 4;
  solveBtn.onclick = () => { state.screen = 'solve'; render(); };
  btnRow.appendChild(solveBtn);
  wrap.appendChild(btnRow);

  return wrap;
}

let dragState = null;

function NoteCard(def, i){
  const investigated = state.investigated.has(i);
  const note = el('div', 'note' + (investigated ? ' investigated revealed' : ''));
  note.id = 'note-'+i;
  note.draggable = true;
  note.style.position = 'relative';
  note.innerHTML = `
    <div class="pin"></div>
    <h4>${def.title}</h4>
    <p>${investigated ? shortPreview(def.key) : 'Click to examine this piece of evidence…'}</p>
    <span class="tag">${investigated ? 'Examined ✓' : 'Unexamined'}</span>
    ${!investigated ? `<div class="unlock-hint">🔍 Click to reveal</div>` : ''}
  `;
  note.addEventListener('click', () => {
    state.activeNoteIndex = i;
    state.investigated.add(i);
    render();
    setTimeout(()=>{
      const dossierEl = document.querySelector('.dossier');
      if(dossierEl) dossierEl.scrollIntoView({behavior:'smooth', block:'center'});
    }, 60);
  });
  // drag reordering (visual/tactile only, evidence board feel)
  note.addEventListener('dragstart', (e) => {
    dragState = i;
    note.classList.add('dragging');
  });
  note.addEventListener('dragend', () => {
    note.classList.remove('dragging');
    dragState = null;
  });
  note.addEventListener('dragover', (e) => e.preventDefault());
  note.addEventListener('drop', (e) => {
    e.preventDefault();
    if(dragState === null || dragState === i) return;
    const grid = document.getElementById('board-grid');
    const nodes = Array.from(grid.children);
    const fromNode = nodes[dragState];
    const toNode = nodes[i];
    if(fromNode && toNode){
      grid.insertBefore(fromNode, toNode);
    }
  });
  return note;
}

function shortPreview(key){
  const c = state.currentCase;
  switch(key){
    case 'objective': return c.objective.slice(0,70)+'…';
    case 'audience': return c.audience.slice(0,70)+'…';
    case 'channels': return c.channels.join(', ');
    case 'budget': return 'Spend breakdown recorded — tap to view chart.';
    case 'metrics': return `Reach ${c.metrics.reach} · CTR ${c.metrics.ctr}`;
    case 'comments': return c.comments[0].slice(0,60)+'…';
    case 'social': return c.social.sentiment;
    case 'clues': return `${c.clues.length} supporting clues on file.`;
    default: return '';
  }
}

function Dossier(def){
  const c = state.currentCase;
  const box = el('div','dossier');
  let inner = `<h3>📄 ${def.title}</h3>`;

  if(def.key === 'objective'){
    inner += `<p style="font-family:var(--font-body); line-height:1.7;">${c.objective}</p>`;
  } else if(def.key === 'audience'){
    inner += `<p style="font-family:var(--font-body); line-height:1.7;">${c.audience}</p>`;
  } else if(def.key === 'channels'){
    inner += `<p style="font-family:var(--font-body); line-height:1.7;">${c.channels.join(' • ')}</p>`;
  } else if(def.key === 'budget'){
    inner += `<div id="budget-bars"></div>`;
  } else if(def.key === 'metrics'){
    inner += `<div class="metric-grid">
      ${Object.entries(c.metrics).map(([k,v]) => `
        <div class="metric-box"><div class="val">${v}</div><div class="lab">${k.toUpperCase()}</div></div>
      `).join('')}
    </div>`;
  } else if(def.key === 'comments'){
    inner += c.comments.map(cm => `<div class="comment">${cm}</div>`).join('');
  } else if(def.key === 'social'){
    inner += `<p style="font-family:var(--font-body);"><strong>Share of Voice:</strong> ${c.social.shareOfVoice}</p>
    <p style="font-family:var(--font-body);"><strong>Sentiment:</strong> ${c.social.sentiment}</p>
    <div id="social-chart" style="margin-top:14px;"></div>`;
  } else if(def.key === 'clues'){
    inner += `<ol style="font-family:var(--font-body); line-height:1.8; padding-left:20px;">
      ${c.clues.map(cl => `<li>${cl}</li>`).join('')}
    </ol>`;
  }

  box.innerHTML = inner;

  if(def.key === 'budget'){
    const container = box.querySelector('#budget-bars');
    Object.entries(c.budget).forEach(([channel, pct]) => {
      const row = el('div','bar-row');
      row.innerHTML = `<div class="lab">${channel}</div><div class="bar-track"><div class="bar-fill" data-pct="${pct}"></div></div><div style="width:40px; text-align:right; font-size:.8rem; color:var(--text-dim);">${pct}%</div>`;
      container.appendChild(row);
    });
    requestAnimationFrame(() => {
      container.querySelectorAll('.bar-fill').forEach(bar => {
        const pct = bar.getAttribute('data-pct');
        setTimeout(()=>{ bar.style.width = pct + '%'; }, 50);
      });
    });
  }

  if(def.key === 'social'){
    const container = box.querySelector('#social-chart');
    const trend = c.social.likesTrend;
    const max = Math.max(...trend);
    const barsHtml = trend.map(v => {
      const h = Math.round((v/max)*70)+10;
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
        <div style="width:100%; max-width:26px; height:${h}px; background:linear-gradient(180deg,var(--emerald-bright),var(--emerald-dim)); border-radius:4px 4px 0 0; box-shadow:0 0 8px rgba(47,227,154,.4);"></div>
      </div>`;
    }).join('');
    container.innerHTML = `<div style="display:flex; gap:8px; align-items:flex-end; height:90px; border-bottom:1px solid var(--emerald-dim); padding-bottom:4px;">${barsHtml}</div>
    <div style="text-align:center; font-size:.72rem; color:var(--text-dim); margin-top:6px; letter-spacing:1px;">ENGAGEMENT TREND (6 WEEKS)</div>`;
  }

  return box;
}

/* draw connecting strings between investigated notes (visual flourish) */
function drawStrings(){
  const svg = document.getElementById('string-svg');
  if(!svg) return;
  svg.innerHTML = '';
  const grid = document.getElementById('board-grid');
  if(!grid) return;
  const boardRect = grid.closest('.corkboard').getBoundingClientRect();
  const indices = Array.from(state.investigated);
  for(let i=0;i<indices.length-1;i++){
    const a = document.getElementById('note-'+indices[i]);
    const b = document.getElementById('note-'+indices[i+1]);
    if(!a||!b) continue;
    const ra = a.getBoundingClientRect(), rb = b.getBoundingClientRect();
    const x1 = ra.left + ra.width/2 - boardRect.left;
    const y1 = ra.top + ra.height/2 - boardRect.top;
    const x2 = rb.left + rb.width/2 - boardRect.left;
    const y2 = rb.top + rb.height/2 - boardRect.top;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',x1); line.setAttribute('y1',y1);
    line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#c0392b');
    line.setAttribute('stroke-width','1.5');
    line.setAttribute('opacity','0.55');
    svg.appendChild(line);
  }
}
window.addEventListener('resize', () => { if(state.screen==='board') drawStrings(); });

/* ---------------- SOLVE ---------------- */
function buildOptions(c){
  // correct answer + 3 distractors pulled from other cases' mistakes, shuffled deterministically per case
  const others = CASES.filter(x => x.company !== c.company);
  shuffleSeeded(others, c.company.length);
  const distractors = others.slice(0,3).map(o => o.mistake);
  const options = [c.mistake, ...distractors];
  shuffleSeeded(options, c.company.length + 7);
  return options;
}
function shuffleSeeded(arr, seed){
  let s = seed || 1;
  for(let i=arr.length-1;i>0;i--){
    s = (s*9301+49297) % 233280;
    const j = Math.floor((s/233280)*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function SolveScreen(){
  const c = state.currentCase;
  if(!c._options){ c._options = buildOptions(c); }
  const wrap = el('div','screen');
  const panel = el('div','solve-panel');
  panel.innerHTML = `<h2>🕵️ Solve the Case</h2>
    <p class="solve-sub">Based on the evidence, what was the primary marketing mistake behind ${c.company}'s underperformance?</p>`;
  const list = el('div','option-list');
  const letters = ['A','B','C','D'];
  c._options.forEach((opt, i) => {
    const optEl = el('div','option');
    if(state.answered){
      if(opt === c.mistake) optEl.classList.add('correct');
      else if(state.selectedAnswer === opt) optEl.classList.add('wrong');
    } else if(state.selectedAnswer === opt){
      optEl.classList.add('selected');
    }
    optEl.innerHTML = `<span class="letter">${letters[i]}</span>${opt}`;
    optEl.onclick = () => {
      if(state.answered) return;
      state.selectedAnswer = opt;
      render();
    };
    list.appendChild(optEl);
  });
  panel.appendChild(list);

  const btnRow = el('div','btn-row');
  if(!state.answered){
    const submitBtn = el('button','btn','Lock In Verdict');
    submitBtn.disabled = !state.selectedAnswer;
    submitBtn.onclick = () => {
      state.answered = true;
      if(state.selectedAnswer === c.mistake) state.score = 1;
      else state.score = 0;
      render();
      setTimeout(showCaseClosed, 500);
    };
    btnRow.appendChild(submitBtn);
  } else {
    const nextBtn = el('button','btn','View Learning Report →');
    nextBtn.onclick = () => { state.screen = 'report'; render(); };
    btnRow.appendChild(nextBtn);
  }
  panel.appendChild(btnRow);
  wrap.appendChild(panel);
  return wrap;
}

function showCaseClosed(){
  const overlay = el('div','case-closed-overlay');
  const stamp = el('div','stamp-anim', state.score ? 'CASE CLOSED' : 'CASE REOPENED');
  overlay.appendChild(stamp);
  document.body.appendChild(overlay);
  overlay.addEventListener('click', () => overlay.remove());
  setTimeout(() => { if(document.body.contains(overlay)) overlay.remove(); }, 2200);
}

/* ---------------- REPORT ---------------- */
function ReportScreen(){
  const c = state.currentCase;
  const wrap = el('div','screen');
  const report = el('div','report');
  report.innerHTML = `
    <h2>📋 Learning Report — ${c.company}</h2>
    <div class="score-line">${state.score ? '✔ Verdict: CORRECT — Case Closed' : '✘ Verdict: Not quite — here is the full truth'}</div>

    <div class="report-section">
      <h4>The Real Mistake</h4>
      <p>${c.mistake}</p>
    </div>

    <div class="report-section">
      <h4>Full Explanation</h4>
      <p>${c.explanation}</p>
    </div>

    <div class="report-section">
      <h4>Suggested Improvements</h4>
      <ul class="improve-list">
        ${c.improvements.map(imp => `<li>${imp}</li>`).join('')}
      </ul>
    </div>
  `;
  const btnRow = el('div','btn-row');
  const again = el('button','btn','Open a New Case File');
  again.onclick = () => {
    state.currentCase = pickRandomCase();
    state.investigated = new Set();
    state.activeNoteIndex = null;
    state.selectedAnswer = null;
    state.answered = false;
    state.score = 0;
    state.screen = 'assignment';
    render();
  };
  const review = el('button','btn secondary','Review the Board Again');
  review.onclick = () => { state.screen = 'board'; render(); };
  btnRow.appendChild(again);
  btnRow.appendChild(review);
  report.appendChild(btnRow);
  wrap.appendChild(report);
  return wrap;
}

/* ---------------- HELPERS ---------------- */
function el(tag, className, text){
  const e = document.createElement(tag);
  if(className) e.className = className;
  if(text !== undefined) e.textContent = text;
  return e;
}

/* ---------------- INIT ---------------- */
render();
</script>
