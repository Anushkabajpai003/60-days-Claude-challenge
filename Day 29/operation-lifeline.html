<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --surface3: #232840;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7a8099;
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gold: #f59e0b;
    --teal: #14b8a6;
    --pink: #ec4899;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 48px rgba(0,0,0,0.6);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #root { min-height: 100vh; }
  .app { min-height: 100vh; padding: 0 0 60px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* Layout */
  .container { max-width: 920px; margin: 0 auto; padding: 0 20px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
  @media(max-width:640px){.grid2,.grid3{grid-template-columns:1fr;}}

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px;
    transition: border-color .2s, transform .2s;
  }
  .card:hover { border-color: var(--border2); }
  .card-elevated { background: var(--surface2); box-shadow: var(--shadow); }
  .card-sm { padding: 14px 18px; border-radius: var(--radius-sm); }
  .card-accent { border-color: rgba(79,142,247,0.35); background: rgba(79,142,247,0.06); }
  .card-danger { border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.06); }
  .card-warning { border-color: rgba(245,158,11,0.35); background: rgba(245,158,11,0.06); }
  .card-success { border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.06); }
  .card-gold { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.07); }
  .card-teal { border-color: rgba(20,184,166,0.35); background: rgba(20,184,166,0.06); }
  .card-purple { border-color: rgba(124,58,237,0.35); background: rgba(124,58,237,0.06); }

  .card-selectable { cursor: pointer; }
  .card-selectable:hover { border-color: var(--accent); transform: translateY(-2px); }
  .card-selected { border-color: var(--accent) !important; background: rgba(79,142,247,0.12) !important; }

  /* Typography */
  h1 { font-size: clamp(26px,5vw,42px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; }
  h2 { font-size: clamp(20px,3vw,28px); font-weight: 700; letter-spacing: -0.3px; }
  h3 { font-size: 18px; font-weight: 600; }
  h4 { font-size: 15px; font-weight: 600; }
  p { line-height: 1.65; color: var(--muted); font-size: 15px; }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); }
  .value { font-size: 24px; font-weight: 700; }
  .big-value { font-size: 48px; font-weight: 800; letter-spacing: -1px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 24px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600;
    cursor: pointer; border: none; transition: all .2s; text-decoration: none;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b7de8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,247,0.4); }
  .btn-secondary { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--surface2); border-color: var(--accent); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #dc2626; }
  .btn-success { background: var(--success); color: #000; }
  .btn-success:hover { background: #16a34a; }
  .btn-lg { padding: 16px 36px; font-size: 17px; border-radius: 10px; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  .badge-amber { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
  .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
  .badge-blue { background: rgba(79,142,247,0.15); color: #93c5fd; border: 1px solid rgba(79,142,247,0.25); }
  .badge-purple { background: rgba(124,58,237,0.15); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.25); }
  .badge-teal { background: rgba(20,184,166,0.15); color: #2dd4bf; border: 1px solid rgba(20,184,166,0.25); }

  /* Progress bars */
  .progress-track { background: rgba(255,255,255,0.07); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }
  .progress-blue { background: linear-gradient(90deg,#3b7de8,#4f8ef7); }
  .progress-green { background: linear-gradient(90deg,#16a34a,#22c55e); }
  .progress-amber { background: linear-gradient(90deg,#d97706,#f59e0b); }
  .progress-red { background: linear-gradient(90deg,#dc2626,#ef4444); }
  .progress-purple { background: linear-gradient(90deg,#6d28d9,#7c3aed); }
  .progress-teal { background: linear-gradient(90deg,#0d9488,#14b8a6); }

  /* Metric card */
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px 18px; }
  .metric-card .label { margin-bottom: 6px; display: block; }
  .metric-card .value { display: block; }

  /* Header bar */
  .header-bar {
    background: rgba(13,15,20,0.85); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border); padding: 14px 0; position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 920px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }

  /* Step indicator */
  .step-indicator { display: flex; align-items: center; gap: 6px; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface3); transition: all .3s; }
  .step-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .step-dot.done { background: var(--success); }

  /* Section header */
  .section-header { margin-bottom: 28px; }
  .section-header .phase-label { color: var(--accent); font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
  .section-header h2 { margin-bottom: 10px; }
  .section-header p { font-size: 15px; }

  /* Stat row */
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }

  /* Animations */
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.6; } }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  @keyframes countUp { from { opacity:0; transform:scale(0.8); } to { opacity:1; transform:scale(1); } }

  .fade-in { animation: fadeUp .5s ease-out; }
  .pulse { animation: pulse 2s infinite; }

  /* Welcome screen */
  .welcome-hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; position: relative; overflow: hidden; }
  .welcome-hero::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(79,142,247,0.12) 0%, transparent 70%); pointer-events:none; }
  .welcome-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.25); border-radius: 20px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 24px; }
  .welcome-hero h1 { max-width: 700px; margin-bottom: 20px; background: linear-gradient(135deg, #e8eaf0 0%, #a0aacc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .welcome-hero p { max-width: 520px; font-size: 17px; margin-bottom: 36px; color: var(--muted); }
  .feature-pills { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; }
  .feature-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--muted); }

  /* Crisis urgency bar */
  .urgency-bar { height: 4px; border-radius: 2px; margin-bottom: 4px; }
  .urgency-critical { background: var(--danger); }
  .urgency-high { background: var(--warning); }
  .urgency-medium { background: var(--accent); }

  /* Negotiation round */
  .negotiation-choice { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all .2s; }
  .negotiation-choice:hover { border-color: var(--accent); background: rgba(79,142,247,0.08); }
  .negotiation-trust { display: flex; gap: 4px; margin-top: 6px; }
  .trust-pip { width: 10px; height: 10px; border-radius: 50%; }

  /* Score ring */
  .score-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-num { position: absolute; text-align: center; }

  /* Tooltip-like explanation */
  .explain-box { background: rgba(79,142,247,0.07); border: 1px solid rgba(79,142,247,0.2); border-radius: 10px; padding: 14px 18px; margin-bottom: 20px; }
  .explain-box p { color: #93c5fd; font-size: 14px; }

  /* AI investment card */
  .ai-card { cursor: pointer; position: relative; overflow: hidden; }
  .ai-card::after { content:''; position:absolute; inset:0; opacity:0; background: rgba(79,142,247,0.08); transition: opacity .2s; border-radius: inherit; }
  .ai-card:hover::after { opacity:1; }
  .ai-card.selected-ai { border-color: var(--teal) !important; }
  .ai-card.selected-ai::after { opacity:1; background: rgba(20,184,166,0.08); }

  /* Final dashboard */
  .score-hero { text-align: center; padding: 40px 0; }
  .overall-score { font-size: 80px; font-weight: 900; letter-spacing: -3px; }
  .feedback-card { border-left: 3px solid var(--accent); padding-left: 16px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Flex utils */
  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-4 { gap: 4px; }
  .gap-8 { gap: 8px; }
  .gap-12 { gap: 12px; }
  .gap-16 { gap: 16px; }
  .gap-20 { gap: 20px; }
  .mt-4 { margin-top: 4px; }
  .mt-8 { margin-top: 8px; }
  .mt-12 { margin-top: 12px; }
  .mt-16 { margin-top: 16px; }
  .mt-20 { margin-top: 20px; }
  .mt-24 { margin-top: 24px; }
  .mt-32 { margin-top: 32px; }
  .mb-4 { margin-bottom: 4px; }
  .mb-8 { margin-bottom: 8px; }
  .mb-12 { margin-bottom: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .mb-24 { margin-bottom: 24px; }
  .text-center { text-align: center; }
  .text-right { text-align: right; }
  .w-full { width: 100%; }
  .color-success { color: var(--success); }
  .color-danger { color: var(--danger); }
  .color-warning { color: var(--warning); }
  .color-accent { color: var(--accent); }
  .color-muted { color: var(--muted); }
  .color-teal { color: var(--teal); }
  .color-gold { color: var(--gold); }
  .color-pink { color: var(--pink); }
  .bold { font-weight: 700; }
  .font-mono { font-family: 'SF Mono', 'Fira Code', monospace; }
</style>
</head>

<script type="text/babel">

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function generateCompany() {
  const industry = pick(INDUSTRIES);
  const name = pick(COMPANY_NAMES);
  const rev = rnd(180, 2400);
  const factories = rnd(2, 8);
  const warehouses = rnd(3, 14);
  const suppliers = rnd(12, 80);
  const invDays = rnd(8, 45);
  const leadTime = rnd(12, 65);
  const countries = shuffle(COUNTRIES_POOL).slice(0, rnd(3, 6));
  return { name, industry, rev, factories, warehouses, suppliers, invDays, leadTime, countries };
}

function generateCrisis() {
  return { ...pick(CRISIS_TYPES), id: Math.random() };
}

function StepDots({ current, total }) {
  return (
    <div className="step-indicator">
      {Array.from({ length: total }).map((_, i) => (
        <div key={i} className={`step-dot ${i < current ? 'done' : i === current ? 'active' : ''}`} />
      ))}
    </div>
  );
}

function ProgressBar({ value, max = 100, color = 'blue', label, showValue = true, animated = false }) {
  const pct = Math.max(0, Math.min(100, (value / max) * 100));
  const [displayed, setDisplayed] = useState(animated ? 0 : pct);
  useEffect(() => {
    if (animated) {
      const t = setTimeout(() => setDisplayed(pct), 100);
      return () => clearTimeout(t);
    } else {
      setDisplayed(pct);
    }
  }, [pct, animated]);
  return (
    <div>
      {(label || showValue) && (
        <div className="flex justify-between mb-4">
          {label && <span style={{ fontSize: 13, color: 'var(--muted)' }}>{label}</span>}
          {showValue && <span style={{ fontSize: 13, fontWeight: 700 }}>{Math.round(pct)}%</span>}
        </div>
      )}
      <div className="progress-track">
        <div className={`progress-fill progress-${color}`} style={{ width: `${displayed}%` }} />
      </div>
    </div>
  );
}

function MetricCard({ label, value, color, sub }) {
  return (
    <div className="metric-card">
      <span className="label">{label}</span>
      <span className="value" style={{ color: color || 'var(--text)' }}>{value}</span>
      {sub && <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function WarRoomScreen({ onNext, crisis }) {
  const [selected, setSelected] = useState([]);

  const [metrics, setMetrics] = useState({ cost: 50, inventory: 50, profit: 50, speed: 50, satisfaction: 50 });

    if (result) return;

  const simulate = () => {
    const chosen = actions.filter(a => selected.includes(a.id));

    chosen.forEach(a => {

      base.speed = Math.max(0, Math.min(100, base.speed + a.speed));
      base.satisfaction = Math.max(0, Math.min(100, base.satisfaction + a.satisfaction));

              {selected.includes(a.id) ? '✓' : a.id}

            <div style={{ flex: 1 }}>
              <h4 style={{ marginBottom: 4, color: selected.includes(a.id) ? 'var(--accent)' : 'var(--text)' }}>{a.name}</h4>
              <p style={{ fontSize: 13, marginBottom: 8 }}>{a.description}</p>
              <div style={{ fontSize: 12, color: 'var(--muted)', fontStyle: 'italic' }}>💡 {a.why}</div>
            </div>
            <div style={{ flexShrink: 0, textAlign: 'right' }}>
              <div style={{ fontSize: 12, color: 'var(--danger)', fontWeight: 600 }}>Cost: ${Math.abs(a.cost).toLocaleString()}</div>

function NegotiationScreen({ onNext }) {
  const [round, setRound] = useState(0);
  const [scores, setScores] = useState({ trust: 50, price: 50, lead: 50 });
  const [history, setHistory] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [animating, setAnimating] = useState(false);

  const currentRound = NEG_ROUNDS[round];
  const totalScore = Math.round((scores.trust * 0.4 + scores.price * 0.3 + scores.lead * 0.3));

  const choose = (idx) => {
    if (animating) return;
    const c = currentRound.choices[idx];
    setChosen(idx);
    setAnimating(true);
    setTimeout(() => {
      const newScores = {
        trust: Math.max(0, Math.min(100, scores.trust + c.trust)),
        price: Math.max(0, Math.min(100, scores.price + c.price)),
        lead: Math.max(0, Math.min(100, scores.lead + c.lead)),
      };
      setScores(newScores);
      setHistory(prev => [...prev, { round: round + 1, choice: c.text, effect: { trust: c.trust, price: c.price, lead: c.lead }, why: c.why }]);
      setAnimating(false);
      setChosen(null);
      if (round < NEG_ROUNDS.length - 1) {
        setRound(r => r + 1);
      } else {
        onNext({ negotiationScore: Math.round((newScores.trust * 0.4 + newScores.price * 0.3 + newScores.lead * 0.3)) });
      }
    }, 900);
  };

  const delta = (v) => v > 0 ? <span style={{ color: 'var(--success)', fontSize: 12 }}>+{v}</span> : <span style={{ color: 'var(--danger)', fontSize: 12 }}>{v}</span>;

  return (
    <div className="container fade-in" style={{ paddingTop: 40 }}>
      <div className="section-header">
        <div className="phase-label">Phase 4 of 7 — Supplier Negotiation</div>
        <h2>🤝 Secure Your Supply Chain</h2>
        <p>You need to negotiate with an emergency supplier to replace your disrupted supply. Each decision affects Trust, Price, and Lead Time — the three pillars of a supplier relationship.</p>
      </div>
      <ExplainBox>
        <strong style={{ color: '#bfdbfe' }}>Why does this matter?</strong> The supplier you negotiate with today may be your emergency lifeline for months. A short-term price win that destroys trust will cost far more in unreliable deliveries and zero goodwill next crisis.
      </ExplainBox>
      <div className="grid3 mb-20">
        <div className="metric-card">
          <span className="label">Supplier Trust</span>
          <span className="value" style={{ color: scores.trust > 60 ? 'var(--success)' : scores.trust > 35 ? 'var(--warning)' : 'var(--danger)' }}>{scores.trust}</span>
          <div style={{ marginTop: 8 }}><ProgressBar value={scores.trust} color={scores.trust > 60 ? 'green' : scores.trust > 35 ? 'amber' : 'red'} showValue={false} animated /></div>
        </div>
        <div className="metric-card">
          <span className="label">Price Advantage</span>
          <span className="value" style={{ color: scores.price > 60 ? 'var(--success)' : scores.price > 35 ? 'var(--warning)' : 'var(--danger)' }}>{scores.price}</span>
          <div style={{ marginTop: 8 }}><ProgressBar value={scores.price} color={scores.price > 60 ? 'green' : scores.price > 35 ? 'amber' : 'red'} showValue={false} animated /></div>
        </div>
        <div className="metric-card">
          <span className="label">Lead Time Score</span>
          <span className="value" style={{ color: scores.lead > 60 ? 'var(--success)' : scores.lead > 35 ? 'var(--warning)' : 'var(--danger)' }}>{scores.lead}</span>
          <div style={{ marginTop: 8 }}><ProgressBar value={scores.lead} color={scores.lead > 60 ? 'green' : scores.lead > 35 ? 'amber' : 'red'} showValue={false} animated /></div>
        </div>
      </div>
      {round < NEG_ROUNDS.length ? (
        <>
          <div className="card card-purple mb-16">
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <span className="badge badge-purple">Round {round + 1} of 4</span>
              <span style={{ fontSize: 14, fontWeight: 600 }}>{currentRound.context}</span>
            </div>
            <p style={{ fontSize: 14, color: 'var(--muted)', marginBottom: 0 }}>{currentRound.explain}</p>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
            {currentRound.choices.map((c, i) => (
              <div
                key={i}
                className={`negotiation-choice ${chosen === i ? 'card-selected' : ''}`}
                onClick={() => choose(i)}
                style={{ opacity: animating && chosen !== i ? 0.5 : 1 }}
              >
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
                  <span style={{ fontSize: 14, fontWeight: 500, flex: 1 }}>{c.text}</span>
                  <div style={{ display: 'flex', gap: 6, flexShrink: 0, fontSize: 11 }}>
                    <span style={{ background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4 }}>T:{c.trust > 0 ? '+' : ''}{c.trust}</span>
                    <span style={{ background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4 }}>P:{c.price > 0 ? '+' : ''}{c.price}</span>
                    <span style={{ background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4 }}>L:{c.lead > 0 ? '+' : ''}{c.lead}</span>
                  </div>
                </div>
                <p style={{ fontSize: 12, color: 'var(--muted)', marginTop: 8, fontStyle: 'italic' }}>💡 {c.why}</p>
              </div>
            ))}
          </div>
        </>
      ) : null}
      {history.length > 0 && (
        <div className="card card-sm">
          <div className="label mb-12">Negotiation History</div>
          {history.map((h, i) => (
            <div key={i} className="stat-row">
              <span style={{ fontSize: 13 }}>Round {h.round}: {h.choice.length > 45 ? h.choice.slice(0, 45) + '…' : h.choice}</span>
              <div style={{ display: 'flex', gap: 8, fontSize: 12 }}>
                {delta(h.effect.trust)} {delta(h.effect.price)} {delta(h.effect.lead)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── SCREEN 6: CEO BOARDROOM ─────────────────────────────────────────────────
function CEOScreen({ onNext }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [chosen, setChosen] = useState(null);
  const [showing, setShowing] = useState(false);

  const q = CEO_QUESTIONS[current];
  const totalPossible = CEO_QUESTIONS.reduce((a, q) => a + Math.max(...q.choices.map(c => c.score)), 0);

  const choose = (idx) => {
    if (showing) return;
    setChosen(idx);
    setShowing(true);
  };

  const next = () => {
    const c = q.choices[chosen];
    setAnswers(prev => [...prev, { q: q.q, choice: c.text, score: c.score, why: c.why }]);
    setShowing(false);
    setChosen(null);
    if (current < CEO_QUESTIONS.length - 1) {
      setCurrent(c => c + 1);
    } else {
      const total = [...answers, { score: q.choices[chosen].score }].reduce((a, x) => a + x.score, 0);
      onNext({ ceoScore: Math.round((total / totalPossible) * 100), ceoAnswers: answers });
    }
  };

  return (
    <div className="container fade-in" style={{ paddingTop: 40 }}>
      <div className="section-header">
        <div className="phase-label">Phase 5 of 7 — CEO Boardroom</div>

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <span className="badge badge-purple">Question {current + 1} of {CEO_QUESTIONS.length}</span>
        <div style={{ display: 'flex', gap: 6 }}>
          {CEO_QUESTIONS.map((_, i) => (
            <div key={i} style={{ width: 28, height: 4, borderRadius: 2, background: i < current ? 'var(--success)' : i === current ? 'var(--accent)' : 'var(--surface3)', transition: 'all .3s' }} />

        </div>
      </div>

        <div className="label mb-12" style={{ color: 'var(--accent)' }}>LEADERSHIP SCENARIO</div>
        <h3 style={{ fontSize: 17, fontWeight: 600, lineHeight: 1.5, marginBottom: 14 }}>{q.q}</h3>
        <p style={{ fontSize: 14 }}>{q.explain}</p>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 20 }}>

          <div
            key={i}

            className={`card card-sm card-selectable ${chosen === i ? 'card-selected' : ''}`}
            style={{ cursor: showing ? 'default' : 'pointer', borderColor: showing && chosen === i ? (c.score >= 15 ? 'var(--success)' : c.score >= 8 ? 'var(--warning)' : 'var(--danger)') : undefined }}
          >
            <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <div style={{ width: 24, height: 24, borderRadius: '50%', background: chosen === i ? 'var(--accent)' : 'var(--surface3)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700, flexShrink: 0, color: chosen === i ? '#fff' : 'var(--muted)', transition: 'all .2s' }}>{String.fromCharCode(65+i)}</div>
              <div style={{ flex: 1 }}>
                <p style={{ color: 'var(--text)', fontSize: 14, marginBottom: 0 }}>{c.text}</p>
                {showing && chosen === i && (
                  <div style={{ marginTop: 10, padding: '8px 12px', borderRadius: 6, background: c.score >= 15 ? 'rgba(34,197,94,0.1)' : c.score >= 8 ? 'rgba(245,158,11,0.1)' : 'rgba(239,68,68,0.1)', border: `1px solid ${c.score >= 15 ? 'rgba(34,197,94,0.25)' : c.score >= 8 ? 'rgba(245,158,11,0.25)' : 'rgba(239,68,68,0.25)'}` }} className="fade-in">

        ))}
      </div>
      {showing && (
        <div className="text-center fade-in">
          <button className="btn btn-primary" onClick={next}>
            {current < CEO_QUESTIONS.length - 1 ? 'Next Question →' : 'See AI Strategy Phase →'}

        </div>
      )}
    </div>
  );
}

      <div className="card card-sm mb-24" style={{ textAlign: 'center', padding: '20px' }}>
        <div style={{ fontSize: 14, color: 'var(--muted)', marginBottom: 4 }}>You managed</div>
        <div style={{ fontSize: 20, fontWeight: 700 }}>{company.name} — {company.industry.name}</div>
        <div style={{ fontSize: 13, color: 'var(--muted)', marginTop: 4 }}>Crisis: {crisis.name} | Revenue: ${company.rev}M | Countries: {company.countries.length}</div>
      </div>

      <div className="text-center">
        <button className="btn btn-primary btn-lg" onClick={onRestart}>↺ Play Again (New Scenario)</button>
        <p style={{ marginTop: 14, fontSize: 13, color: 'var(--muted)' }}>Each playthrough uses different companies, crises, and outcomes.</p>
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(0);
  const [company, setCompany] = useState(null);
  const [crisis, setCrisis] = useState(null);
  const [warRoomData, setWarRoomData] = useState(null);
  const [negData, setNegData] = useState(null);
  const [ceoData, setCeoData] = useState(null);
  const [aiData, setAiData] = useState(null);

  const restart = () => {
    setStep(0); setCompany(null); setCrisis(null);
    setWarRoomData(null); setNegData(null); setCeoData(null); setAiData(null);
  };

  const startSim = () => {
    setCompany(generateCompany());
    setCrisis(generateCrisis());
    setStep(1);
  };

  return (
    <div className="app">
      <Header step={step} company={company} onRestart={restart} />
      {step === 0 && <WelcomeScreen onStart={startSim} />}
      {step === 1 && <CompanyScreen company={company} onNext={() => setStep(2)} />}
      {step === 2 && <CrisisScreen crisis={crisis} company={company} onNext={() => setStep(3)} />}
      {step === 3 && <WarRoomScreen crisis={crisis} onNext={(d) => { setWarRoomData(d); setStep(4); }} />}
      {step === 4 && <NegotiationScreen onNext={(d) => { setNegData(d); setStep(5); }} />}
      {step === 5 && <CEOScreen onNext={(d) => { setCeoData(d); setStep(6); }} />}
      {step === 6 && <AIScreen onNext={(d) => { setAiData(d); setStep(7); }} />}
      {step === 7 && warRoomData && negData && ceoData && aiData && (
        <ResultsScreen
          data={{ company, crisis, warRoom: warRoomData, negotiation: negData, ceo: ceoData, ai: aiData }}
          onRestart={restart}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
