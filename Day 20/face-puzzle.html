<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Face Puzzle — Shuffle Your Selfie</title>
<meta name="description" content="Take a selfie, slice it into a puzzle, and race the clock to put your face back together.">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5.0.18/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.16/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/space-mono@5.0.18/index.css">
<style>
  :root{
    --bg:#170F26;
    --bg-soft:#1d1430;
    --panel:#241936;
    --panel-light:#32234f;
    --border:rgba(255,255,255,.09);
    --text:#F4EFFB;
    --text-muted:#b6a8d1;
    --coral:#ff7a59;
    --coral-dim:#7a4536;
    --gold:#ffc857;
    --teal:#5eeacd;
    --mint:#4ade80;
    --danger:#ff6b6b;
    --radius-lg:22px;
    --radius-md:14px;
    --radius-sm:8px;
    --font-display:"Fraunces",Georgia,"Times New Roman",serif;
    --font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --font-mono:"Space Mono","SFMono-Regular",Menlo,Consolas,monospace;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(circle at 18% -10%, rgba(255,122,89,.18), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(94,234,205,.12), transparent 40%),
      linear-gradient(165deg, var(--bg) 0%, #1c1230 55%, var(--bg) 100%);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    padding:28px 16px 60px;
  }

  .app{max-width:920px;margin:0 auto;}

  /* ---------- Header ---------- */
  .topbar{text-align:center;margin-bottom:28px;}
  .brand-eyebrow{
    display:inline-block;
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  .brand-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:clamp(30px,6vw,46px);
    line-height:1.05;
    margin:0;
    letter-spacing:-.01em;
  }
  .brand-title em{
    font-style:italic;
    font-weight:500;
    color:var(--coral);
  }

  /* ---------- Screens ---------- */
  .stage{display:flex;flex-direction:column;align-items:center;}
  .screen{display:none;width:100%;flex-direction:column;align-items:center;gap:22px;}
  .screen.active{display:flex;}

  /* ---------- Viewfinder (signature corner-bracket frame) ---------- */
  .viewfinder{
    position:relative;
    padding:16px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    width:100%;
  }
  .vf-corner{position:absolute;width:28px;height:28px;pointer-events:none;}
  .vf-corner.tl{top:8px;left:8px;border-top:3px solid var(--gold);border-left:3px solid var(--gold);border-radius:8px 0 0 0;}
  .vf-corner.tr{top:8px;right:8px;border-top:3px solid var(--gold);border-right:3px solid var(--gold);border-radius:0 8px 0 0;}
  .vf-corner.bl{bottom:8px;left:8px;border-bottom:3px solid var(--gold);border-left:3px solid var(--gold);border-radius:0 0 0 8px;}
  .vf-corner.br{bottom:8px;right:8px;border-bottom:3px solid var(--gold);border-right:3px solid var(--gold);border-radius:0 0 8px 0;}

  /* ---------- Camera screen ---------- */
  #cameraScreen{max-width:460px;}
  .vf-camera{aspect-ratio:1/1;display:flex;}
  .vf-camera video{
    width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);
    transform:scaleX(-1);background:#000;display:block;
  }
  .hidden-canvas{display:none;}
  .cam-overlay{
    position:absolute;inset:16px;border-radius:var(--radius-md);
    background:rgba(15,9,26,.86);
    display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;gap:12px;
  }
  [data-state="loading"] .state-loading{display:flex;}
  [data-state="denied"] .state-denied{display:flex;}
  .spinner{
    width:34px;height:34px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);
    animation:spin 0.9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .cam-error-title{font-family:var(--font-display);font-size:20px;font-weight:600;margin:0;}
  .cam-error-text{font-size:14px;color:var(--text-muted);margin:0;max-width:300px;line-height:1.5;}

  .cam-actions{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .upload-btn{cursor:pointer;}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:var(--font-body);font-weight:600;font-size:14.5px;
    border:none;border-radius:999px;padding:13px 26px;cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:focus-visible{outline:2px solid var(--teal);outline-offset:3px;}
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--coral);color:#1c0f08;box-shadow:0 6px 18px rgba(255,122,89,.3);}
  .btn-primary:hover{background:#ff8c6e;}
  .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
  .btn-shutter{
    width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff957a, var(--coral) 70%);
    display:flex;align-items:center;justify-content:center;padding:0;
    box-shadow:0 8px 22px rgba(255,122,89,.35);
  }
  .btn-shutter:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;}
  .shutter-ring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,255,255,.65);}

  /* ---------- Leaderboard (intro panel) ---------- */
  .leaderboard-panel{width:100%;}
  .leaderboard-panel h2{
    font-family:var(--font-display);font-size:17px;font-weight:600;
    margin:0 0 10px;color:var(--text);
  }
  .leaderboard-block h3{
    font-family:var(--font-display);font-size:15px;font-weight:600;
    margin:0 0 8px;color:var(--text);
  }
  .leaderboard-list{display:flex;flex-direction:column;gap:6px;}
  .lb-row{
    display:grid;grid-template-columns:22px 70px 1fr auto;align-items:center;gap:10px;
    background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius-sm);
    padding:9px 12px;font-size:13px;
  }
  .lb-rank{font-family:var(--font-mono);color:var(--gold);font-weight:700;}
  .lb-time{font-size:13px;color:var(--text);}
  .lb-meta{color:var(--text-muted);font-size:12.5px;}
  .lb-date{color:var(--text-muted);font-size:11.5px;text-align:right;}
  .lb-empty{color:var(--text-muted);font-size:13.5px;margin:0;padding:10px 2px;}

  /* ---------- Preview / difficulty screen ---------- */
  #previewScreen{max-width:460px;}
  .vf-preview{aspect-ratio:1/1;display:flex;}
  .vf-preview img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-md);display:block;}

  .difficulty-picker{width:100%;text-align:center;}
  .picker-label{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--text-muted);margin:0 0 14px;
  }
  .chip-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
  .chip{
    display:flex;flex-direction:column;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-md);
    padding:16px 18px;cursor:pointer;color:var(--text);min-width:110px;
    transition:transform .15s ease, border-color .15s ease;
  }
  .chip:hover{transform:translateY(-3px);border-color:var(--gold);}
  .chip:focus-visible{outline:2px solid var(--teal);outline-offset:3px;}
  .chip-grid{display:grid;width:44px;height:44px;gap:2px;}
  .chip-grid i{border-radius:2px;display:block;opacity:.9;}
  .chip[data-n="3"] .chip-grid i{background:var(--mint);}
  .chip[data-n="4"] .chip-grid i{background:var(--gold);}
  .chip[data-n="5"] .chip-grid i{background:var(--coral);}
  .chip-text{font-size:13.5px;font-weight:600;line-height:1.4;text-align:center;}
  .chip-text small{font-family:var(--font-mono);color:var(--text-muted);font-weight:400;}

  /* ---------- Puzzle screen ---------- */
  #puzzleScreen{max-width:520px;}
  .stats-bar{
    width:100%;display:flex;justify-content:space-between;gap:10px;
    background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-md);
    padding:14px 20px;
  }
  .stat{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;}
  .stat-label{
    font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-muted);
  }
  .stat-value{font-size:19px;font-weight:700;}
  .stat-value.mono{font-family:var(--font-mono);}

  .vf-board{aspect-ratio:1/1;display:flex;}
  .board{
    position:relative;width:100%;height:100%;
    background:var(--panel-light);border-radius:var(--radius-md);overflow:hidden;
  }
  .piece{
    position:absolute;top:0;left:0;
    background-repeat:no-repeat;
    border-radius:5px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.10);
    cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;
    transition:left .22s cubic-bezier(.2,.8,.2,1), top .22s cubic-bezier(.2,.8,.2,1), box-shadow .15s ease;
  }
  .piece.dragging{
    cursor:grabbing;transition:box-shadow .1s ease;
    box-shadow:0 10px 26px rgba(0,0,0,.45), inset 0 0 0 3px var(--teal);
  }
  .piece.correct{box-shadow:inset 0 0 0 3px var(--mint);}
  .target-highlight{
    position:absolute;border:2px dashed var(--teal);border-radius:6px;
    pointer-events:none;opacity:0;transition:opacity .12s ease;
  }

  .puzzle-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

  /* ---------- Results overlay ---------- */
  .overlay{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(10,6,18,.78);backdrop-filter:blur(6px);
    align-items:center;justify-content:center;padding:20px;
  }
  .overlay.active{display:flex;}
  .results-card{
    max-width:420px;width:100%;text-align:center;
    background:var(--panel);position:relative;
  }
  .results-eyebrow{
    font-family:var(--font-mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--mint);margin:6px 0 4px;
  }
  .results-title{font-family:var(--font-display);font-size:30px;font-weight:600;margin:0 0 18px;}
  .results-stats{display:flex;justify-content:space-around;gap:10px;margin-bottom:22px;}
  .results-stat{display:flex;flex-direction:column-reverse;gap:5px;}
  .rs-value{font-size:21px;font-weight:700;}
  .rs-label{
    font-family:var(--font-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-muted);
  }
  .leaderboard-block{
    text-align:left;background:var(--bg-soft);border:1px solid var(--border);
    border-radius:var(--radius-md);padding:14px 16px;margin-bottom:20px;
  }
  .results-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

  .confetti-layer{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:210;}
  .confetti-piece{
    position:absolute;top:-12px;width:8px;height:14px;border-radius:2px;
    animation:confetti-fall 1.7s ease-in forwards;
  }
  @keyframes confetti-fall{
    to{transform:translateY(110vh) rotate(540deg);opacity:0;}
  }

  /* ---------- Layout: wider screens ---------- */
  @media (min-width:760px){
    #cameraScreen{
      max-width:none;width:100%;
      display:grid;grid-template-columns:1fr 280px;gap:26px;align-items:start;
    }
    #cameraScreen.active{display:grid;}
    .cam-stack{display:flex;flex-direction:column;align-items:center;gap:18px;}
    .leaderboard-panel{padding-top:6px;}
  }

  @media (max-width:480px){
    .lb-row{grid-template-columns:18px 62px 1fr;}
    .lb-date{display:none;}
    .chip{min-width:92px;padding:13px 12px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <span class="brand-eyebrow">Face Puzzle Studio</span>
    <h1 class="brand-title">Shuffle Your <em>Selfie</em></h1>
  </header>

  <main class="stage">

    <!-- CAMERA SCREEN -->
    <section id="cameraScreen" class="screen active" data-state="loading">
      <div class="cam-stack">
        <div class="viewfinder vf-camera">
          <span class="vf-corner tl"></span><span class="vf-corner tr"></span>
          <span class="vf-corner bl"></span><span class="vf-corner br"></span>
          <video id="video" autoplay playsinline muted></video>
          <div class="cam-overlay state-loading">
            <div class="spinner"></div>
            <p>Asking your camera nicely…</p>
          </div>
          <div class="cam-overlay state-denied">
            <p class="cam-error-title">No camera, no problem</p>
            <p class="cam-error-text" id="camErrorText">We couldn't access your camera.</p>
            <button type="button" class="btn btn-primary" id="retryCameraBtn">Try again</button>
          </div>
        </div>
        <div class="cam-actions">
          <button type="button" class="btn btn-shutter" id="takePhotoBtn" disabled aria-label="Take photo">
            <span class="shutter-ring"></span>
          </button>
          <label class="btn btn-ghost upload-btn">
            Upload a photo instead
            <input type="file" id="uploadInput" accept="image/*" hidden>
          </label>
        </div>
      </div>
      <aside class="leaderboard-panel">
        <h2>Best Times</h2>
        <div class="leaderboard-list" id="introLeaderboardList"></div>
      </aside>
    </section>

    <!-- PREVIEW / DIFFICULTY SCREEN -->
    <section id="previewScreen" class="screen">
      <div class="viewfinder vf-preview">
        <span class="vf-corner tl"></span><span class="vf-corner tr"></span>
        <span class="vf-corner bl"></span><span class="vf-corner br"></span>
        <img id="previewImg" alt="Your captured photo">
      </div>
      <div class="difficulty-picker">
        <p class="picker-label">Pick a difficulty</p>
        <div class="chip-row" id="chipRow"></div>
      </div>
      <button type="button" class="btn btn-ghost" id="retakeBtn">Retake photo</button>
    </section>

    <!-- PUZZLE SCREEN -->
    <section id="puzzleScreen" class="screen">
      <div class="stats-bar">
        <div class="stat"><span class="stat-label">Time</span><span class="stat-value mono" id="timeStat">00:00.0</span></div>
        <div class="stat"><span class="stat-label">Moves</span><span class="stat-value mono" id="movesStat">0</span></div>
        <div class="stat"><span class="stat-label">Placed</span><span class="stat-value mono" id="placedStat">0/9</span></div>
      </div>
      <div class="viewfinder vf-board">
        <span class="vf-corner tl"></span><span class="vf-corner tr"></span>
        <span class="vf-corner bl"></span><span class="vf-corner br"></span>
        <div class="board" id="board">
          <div class="target-highlight" id="targetHighlight"></div>
        </div>
      </div>
      <div class="puzzle-actions">
        <button type="button" class="btn btn-ghost" id="shuffleAgainBtn">Reshuffle</button>
        <button type="button" class="btn btn-ghost" id="newPhotoBtnFromPuzzle">New photo</button>
      </div>
    </section>

  </main>
</div>

<!-- RESULTS OVERLAY -->
<div class="overlay" id="resultsOverlay">
  <div class="results-card viewfinder vf-results">
    <span class="vf-corner tl"></span><span class="vf-corner tr"></span>
    <span class="vf-corner bl"></span><span class="vf-corner br"></span>
    <p class="results-eyebrow">Solved!</p>
    <h2 class="results-title">Picture Perfect</h2>
    <div class="results-stats">
      <div class="results-stat"><span class="rs-value mono" id="resultTime">00:00.0</span><span class="rs-label">Time</span></div>
      <div class="results-stat"><span class="rs-value mono" id="resultMoves">0</span><span class="rs-label">Moves</span></div>
      <div class="results-stat"><span class="rs-value mono" id="resultDifficulty">3×3</span><span class="rs-label">Grid</span></div>
    </div>
    <div class="leaderboard-block">
      <h3>Best Times</h3>
      <div class="leaderboard-list" id="resultsLeaderboardList"></div>
    </div>
    <div class="results-actions">
      <button type="button" class="btn btn-primary" id="playAgainBtn">Play again</button>
      <button type="button" class="btn btn-ghost" id="newPhotoBtnFromResults">New photo</button>
    </div>
  </div>
</div>
<div class="confetti-layer" id="confettiLayer"></div>

<canvas id="captureCanvas" class="hidden-canvas"></canvas>

<script>
(function(){
  "use strict";

  /* ---------------- DOM references ---------------- */
  var cameraScreenEl   = document.getElementById('cameraScreen');
  var previewScreenEl  = document.getElementById('previewScreen');
  var puzzleScreenEl   = document.getElementById('puzzleScreen');
  var videoEl          = document.getElementById('video');
  var captureCanvas    = document.getElementById('captureCanvas');
  var takePhotoBtn     = document.getElementById('takePhotoBtn');
  var retryCameraBtn   = document.getElementById('retryCameraBtn');
  var camErrorTextEl   = document.getElementById('camErrorText');
  var uploadInput      = document.getElementById('uploadInput');
  var previewImgEl     = document.getElementById('previewImg');
  var chipRowEl        = document.getElementById('chipRow');
  var retakeBtn        = document.getElementById('retakeBtn');

  var boardEl          = document.getElementById('board');
  var targetHighlightEl= document.getElementById('targetHighlight');
  var timeStatEl       = document.getElementById('timeStat');
  var movesStatEl      = document.getElementById('movesStat');
  var placedStatEl     = document.getElementById('placedStat');
  var shuffleAgainBtn  = document.getElementById('shuffleAgainBtn');
  var newPhotoBtnPuzzle= document.getElementById('newPhotoBtnFromPuzzle');

  var resultsOverlayEl = document.getElementById('resultsOverlay');
  var resultTimeEl     = document.getElementById('resultTime');
  var resultMovesEl    = document.getElementById('resultMoves');
  var resultDifficultyEl = document.getElementById('resultDifficulty');
  var playAgainBtn     = document.getElementById('playAgainBtn');
  var newPhotoBtnResults = document.getElementById('newPhotoBtnFromResults');
  var confettiLayerEl  = document.getElementById('confettiLayer');

  var introLeaderboardListEl   = document.getElementById('introLeaderboardList');
  var resultsLeaderboardListEl = document.getElementById('resultsLeaderboardList');

  var LB_KEY = 'facePuzzle_leaderboard_v1';

  /* ---------------- App state ---------------- */
  var state = {
    stream:null,
    photoDataURL:null,
    n:3,
    total:9,
    cellSize:0,
    boardSize:0,
    boardState:[],     // boardState[cellIndex] = originIndex of piece sitting there
    pieceEls:{},        // originIndex -> element
    moves:0,
    correctCount:0,
    playing:false,
    startTime:0,
    timerRAF:null,
    drag:null
  };

  /* ---------------- Helpers ---------------- */
  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }
  function pad2(v){ return String(v).padStart(2,'0'); }

  function formatTime(ms){
    var totalMs = Math.max(0, ms);
    var mm = Math.floor(totalMs/60000);
    var ss = Math.floor((totalMs%60000)/1000);
    var t  = Math.floor((totalMs%1000)/100);
    return pad2(mm) + ':' + pad2(ss) + '.' + t;
  }

  function switchScreen(id){
    [cameraScreenEl, previewScreenEl, puzzleScreenEl].forEach(function(s){
      s.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  function debounce(fn, wait){
    var t;
    return function(){
      var args = arguments;
      clearTimeout(t);
      t = setTimeout(function(){ fn.apply(null, args); }, wait);
    };
  }

  /* ---------------- Camera ---------------- */
  function initCamera(){
    cameraScreenEl.dataset.state = 'loading';
    takePhotoBtn.disabled = true;

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      camErrorTextEl.textContent = "This browser doesn't support camera access. You can upload a photo instead.";
      cameraScreenEl.dataset.state = 'denied';
      return;
    }

    navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:1280} },
      audio:false
    }).then(function(stream){
      state.stream = stream;
      videoEl.srcObject = stream;
      var playPromise = videoEl.play();
      if(playPromise && playPromise.catch){ playPromise.catch(function(){}); }
      cameraScreenEl.dataset.state = 'ready';
      takePhotoBtn.disabled = false;
    }).catch(function(err){
      var msg = "We couldn't access your camera. You can upload a photo instead.";
      var name = err && err.name;
      if(name === 'NotAllowedError' || name === 'PermissionDeniedError'){
        msg = "Camera access was denied. Allow camera access in your browser's settings, then try again — or upload a photo instead.";
      } else if(name === 'NotFoundError' || name === 'DevicesNotFoundError'){
        msg = "No camera was found on this device. You can upload a photo instead.";
      } else if(name === 'NotReadableError' || name === 'TrackStartError'){
        msg = "Your camera is busy in another app. Close it and try again, or upload a photo instead.";
      }
      camErrorTextEl.textContent = msg;
      cameraScreenEl.dataset.state = 'denied';
    });
  }

  function stopCameraStream(){
    if(state.stream){
      state.stream.getTracks().forEach(function(t){ t.stop(); });
      state.stream = null;
    }
    videoEl.srcObject = null;
  }

  retryCameraBtn.addEventListener('click', initCamera);

  takePhotoBtn.addEventListener('click', function(){
    var vw = videoEl.videoWidth, vh = videoEl.videoHeight;
    if(!vw || !vh) return;
    var size = Math.min(vw, vh);
    var sx = (vw-size)/2, sy = (vh-size)/2;
    captureCanvas.width = 720; captureCanvas.height = 720;
    var ctx = captureCanvas.getContext('2d');
    ctx.save();
    ctx.translate(captureCanvas.width, 0);
    ctx.scale(-1,1);
    ctx.drawImage(videoEl, sx, sy, size, size, 0, 0, captureCanvas.width, captureCanvas.height);
    ctx.restore();
    state.photoDataURL = captureCanvas.toDataURL('image/jpeg', 0.92);
    stopCameraStream();
    showPreviewScreen(state.photoDataURL);
  });

  uploadInput.addEventListener('change', function(e){
    var file = e.target.files && e.target.files[0];
    e.target.value = '';
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(ev){
      var img = new Image();
      img.onload = function(){
        var size = Math.min(img.width, img.height);
        var sx = (img.width-size)/2, sy = (img.height-size)/2;
        captureCanvas.width = 720; captureCanvas.height = 720;
        var ctx = captureCanvas.getContext('2d');
        ctx.drawImage(img, sx, sy, size, size, 0, 0, 720, 720);
        state.photoDataURL = captureCanvas.toDataURL('image/jpeg', 0.92);
        stopCameraStream();
        showPreviewScreen(state.photoDataURL);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  function showPreviewScreen(dataURL){
    previewImgEl.src = dataURL;
    switchScreen('previewScreen');
  }

  retakeBtn.addEventListener('click', function(){
    switchScreen('cameraScreen');
    initCamera();
  });

  /* ---------------- Difficulty chips ---------------- */
  var DIFFICULTIES = [
    {n:3, label:'Easy'},
    {n:4, label:'Medium'},
    {n:5, label:'Hard'}
  ];

  function buildDifficultyChips(){
    DIFFICULTIES.forEach(function(d){
      var chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.dataset.n = d.n;

      var grid = document.createElement('span');
      grid.className = 'chip-grid';
      grid.style.gridTemplateColumns = 'repeat(' + d.n + ',1fr)';
      grid.style.gridTemplateRows = 'repeat(' + d.n + ',1fr)';
      for(var i=0;i<d.n*d.n;i++){
        grid.appendChild(document.createElement('i'));
      }

      var text = document.createElement('span');
      text.className = 'chip-text';
      text.innerHTML = d.label + '<br><small>' + d.n + ' × ' + d.n + '</small>';

      chip.appendChild(grid);
      chip.appendChild(text);
      chip.addEventListener('click', function(){ startPuzzle(d.n); });
      chipRowEl.appendChild(chip);
    });
  }

  /* ---------------- Puzzle construction ---------------- */
  function shuffledPermutation(total){
    var arr = [];
    for(var i=0;i<total;i++) arr.push(i);
    function isIdentity(a){
      for(var i=0;i<a.length;i++){ if(a[i]!==i) return false; }
      return true;
    }
    do {
      for(var i=arr.length-1;i>0;i--){
        var j = Math.floor(Math.random()*(i+1));
        var tmp = arr[i]; arr[i]=arr[j]; arr[j]=tmp;
      }
    } while(isIdentity(arr));
    return arr;
  }

  function buildBoard(n, imageURL){
    state.n = n;
    state.total = n*n;
    boardEl.innerHTML = '';
    boardEl.appendChild(targetHighlightEl);
    targetHighlightEl.style.opacity = '0';

    var size = boardEl.clientWidth;
    state.boardSize = size;
    state.cellSize = size / n;

    state.boardState = shuffledPermutation(state.total);
    state.pieceEls = {};

    for(var originIndex=0; originIndex<state.total; originIndex++){
      var originRow = Math.floor(originIndex/n);
      var originCol = originIndex % n;
      var posX = (n===1) ? 0 : (originCol*100/(n-1));
      var posY = (n===1) ? 0 : (originRow*100/(n-1));

      var el = document.createElement('div');
      el.className = 'piece';
      el.style.width = state.cellSize + 'px';
      el.style.height = state.cellSize + 'px';
      el.style.backgroundImage = 'url(' + imageURL + ')';
      el.style.backgroundSize = (n*100) + '% ' + (n*100) + '%';
      el.style.backgroundPosition = posX + '% ' + posY + '%';
      el.dataset.origin = originIndex;

      el.addEventListener('pointerdown', onPointerDown);
      el.addEventListener('pointermove', onPointerMove);
      el.addEventListener('pointerup', onPointerUp);
      el.addEventListener('pointercancel', onPointerCancel);

      boardEl.appendChild(el);
      state.pieceEls[originIndex] = el;

      var cellIndex = state.boardState.indexOf(originIndex);
      positionPiece(el, cellIndex, false);
    }

    updateCorrectness();
  }

  function positionPiece(el, cellIndex, animate){
    var row = Math.floor(cellIndex/state.n);
    var col = cellIndex % state.n;
    var left = col*state.cellSize;
    var top  = row*state.cellSize;
    if(!animate){
      el.style.transition = 'none';
    } else {
      el.style.transition = '';
    }
    el.style.left = left + 'px';
    el.style.top = top + 'px';
    el._cellIndex = cellIndex;
    if(!animate){
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ el.style.transition = ''; });
      });
    }
  }

  function updateCorrectness(){
    var correct = 0;
    for(var c=0;c<state.total;c++){
      var originIndex = state.boardState[c];
      var el = state.pieceEls[originIndex];
      var isCorrect = (originIndex === c);
      el.classList.toggle('correct', isCorrect);
      if(isCorrect) correct++;
    }
    state.correctCount = correct;
    placedStatEl.textContent = correct + '/' + state.total;
    if(correct === state.total){
      onWin();
    }
  }

  function swapPieces(cellA, cellB){
    var originA = state.boardState[cellA];
    var originB = state.boardState[cellB];
    state.boardState[cellA] = originB;
    state.boardState[cellB] = originA;
    positionPiece(state.pieceEls[originA], cellB, true);
    positionPiece(state.pieceEls[originB], cellA, true);
  }

  /* ---------------- Drag & touch handling (Pointer Events) ---------------- */
  function showTargetHighlight(cellIndex, sourceCell){
    if(cellIndex === sourceCell){
      targetHighlightEl.style.opacity = '0';
      return;
    }
    var row = Math.floor(cellIndex/state.n);
    var col = cellIndex % state.n;
    targetHighlightEl.style.width = state.cellSize + 'px';
    targetHighlightEl.style.height = state.cellSize + 'px';
    targetHighlightEl.style.left = (col*state.cellSize) + 'px';
    targetHighlightEl.style.top = (row*state.cellSize) + 'px';
    targetHighlightEl.style.opacity = '1';
  }
  function hideTargetHighlight(){ targetHighlightEl.style.opacity = '0'; }

  function onPointerDown(e){
    if(!e.isPrimary) return;
    var el = e.currentTarget;
    el.setPointerCapture(e.pointerId);
    var boardRect = boardEl.getBoundingClientRect();
    var pieceRect = el.getBoundingClientRect();
    state.drag = {
      el: el,
      pointerId: e.pointerId,
      offsetX: e.clientX - pieceRect.left,
      offsetY: e.clientY - pieceRect.top,
      sourceCell: el._cellIndex,
      targetCell: el._cellIndex,
      boardRect: boardRect
    };
    el.classList.add('dragging');
    el.style.zIndex = 50;
  }

  function onPointerMove(e){
    var d = state.drag;
    if(!d || d.el !== e.currentTarget || e.pointerId !== d.pointerId) return;
    e.preventDefault();
    var rect = d.boardRect;
    var maxPos = state.boardSize - state.cellSize;
    var left = clamp(e.clientX - rect.left - d.offsetX, 0, maxPos);
    var top  = clamp(e.clientY - rect.top - d.offsetY, 0, maxPos);
    d.el.style.left = left + 'px';
    d.el.style.top = top + 'px';

    var centerX = left + state.cellSize/2;
    var centerY = top + state.cellSize/2;
    var col = clamp(Math.floor(centerX/state.cellSize), 0, state.n-1);
    var row = clamp(Math.floor(centerY/state.cellSize), 0, state.n-1);
    d.targetCell = row*state.n + col;
    showTargetHighlight(d.targetCell, d.sourceCell);
  }

  function finishDrag(e, commit){
    var d = state.drag;
    if(!d || d.el !== e.currentTarget || e.pointerId !== d.pointerId) return;
    try{ d.el.releasePointerCapture(e.pointerId); }catch(err){}
    d.el.classList.remove('dragging');
    d.el.style.zIndex = '';
    hideTargetHighlight();
    state.drag = null;

    var targetCell = commit ? d.targetCell : d.sourceCell;
    if(targetCell !== d.sourceCell){
      swapPieces(d.sourceCell, targetCell);
      state.moves++;
      movesStatEl.textContent = state.moves;
    } else {
      positionPiece(d.el, d.sourceCell, true);
    }
    updateCorrectness();
  }

  function onPointerUp(e){ finishDrag(e, true); }
  function onPointerCancel(e){ finishDrag(e, false); }

  /* ---------------- Timer ---------------- */
  function startTimer(){
    state.startTime = performance.now();
    state.playing = true;
    if(state.timerRAF) cancelAnimationFrame(state.timerRAF);
    tick();
  }
  function tick(){
    if(!state.playing) return;
    var elapsed = performance.now() - state.startTime;
    timeStatEl.textContent = formatTime(elapsed);
    state.timerRAF = requestAnimationFrame(tick);
  }
  function stopTimer(){
    var elapsed = performance.now() - state.startTime;
    state.playing = false;
    if(state.timerRAF) cancelAnimationFrame(state.timerRAF);
    return elapsed;
  }

  function resetStats(){
    state.moves = 0;
    movesStatEl.textContent = '0';
    placedStatEl.textContent = '0/' + state.total;
    timeStatEl.textContent = '00:00.0';
  }

  /* ---------------- Starting / replaying a puzzle ---------------- */
  function startPuzzle(n){
    switchScreen('puzzleScreen');
    buildBoard(n, state.photoDataURL);
    resetStats();
    startTimer();
  }

  shuffleAgainBtn.addEventListener('click', function(){
    stopTimer();
    buildBoard(state.n, state.photoDataURL);
    resetStats();
    startTimer();
  });

  newPhotoBtnPuzzle.addEventListener('click', goToNewPhoto);
  newPhotoBtnResults.addEventListener('click', function(){
    hideOverlay();
    goToNewPhoto();
  });

  function goToNewPhoto(){
    stopTimer();
    switchScreen('cameraScreen');
    initCamera();
  }

  playAgainBtn.addEventListener('click', function(){
    hideOverlay();
    buildBoard(state.n, state.photoDataURL);
    resetStats();
    startTimer();
  });

  /* ---------------- Win / results / leaderboard ---------------- */
  function onWin(){
    var finalMs = stopTimer();
    resultTimeEl.textContent = formatTime(finalMs);
    resultMovesEl.textContent = state.moves;
    resultDifficultyEl.textContent = state.n + ' × ' + state.n;

    saveScore({
      date: new Date().toISOString(),
      timeMs: finalMs,
      moves: state.moves,
      difficulty: state.n + '×' + state.n
    });
    renderLeaderboard(resultsLeaderboardListEl);
    renderLeaderboard(introLeaderboardListEl);

    showOverlay();
    launchConfetti();
  }

  function showOverlay(){ resultsOverlayEl.classList.add('active'); }
  function hideOverlay(){ resultsOverlayEl.classList.remove('active'); confettiLayerEl.innerHTML=''; }

  function loadLeaderboard(){
    try{
      var raw = localStorage.getItem(LB_KEY);
      var list = raw ? JSON.parse(raw) : [];
      return Array.isArray(list) ? list : [];
    }catch(e){
      return [];
    }
  }

  function saveScore(entry){
    try{
      var list = loadLeaderboard();
      list.push(entry);
      list.sort(function(a,b){ return a.timeMs - b.timeMs; });
      list = list.slice(0,5);
      localStorage.setItem(LB_KEY, JSON.stringify(list));
    }catch(e){
      console.warn('Could not save score to localStorage.', e);
    }
  }

  function renderLeaderboard(container){
    var list = loadLeaderboard();
    container.innerHTML = '';
    if(list.length === 0){
      var empty = document.createElement('p');
      empty.className = 'lb-empty';
      empty.textContent = 'No times yet — be the first to finish.';
      container.appendChild(empty);
      return;
    }
    list.forEach(function(entry, i){
      var row = document.createElement('div');
      row.className = 'lb-row';

      var rank = document.createElement('span');
      rank.className = 'lb-rank';
      rank.textContent = (i+1);

      var time = document.createElement('span');
      time.className = 'lb-time mono';
      time.textContent = formatTime(entry.timeMs);

      var meta = document.createElement('span');
      meta.className = 'lb-meta';
      meta.textContent = entry.difficulty + ' · ' + entry.moves + ' moves';

      var date = document.createElement('span');
      date.className = 'lb-date';
      var d = new Date(entry.date);
      date.textContent = isNaN(d.getTime()) ? '' : (d.getMonth()+1) + '/' + d.getDate() + '/' + String(d.getFullYear()).slice(2);

      row.appendChild(rank);
      row.appendChild(time);
      row.appendChild(meta);
      row.appendChild(date);
      container.appendChild(row);
    });
  }

  /* ---------------- Confetti ---------------- */
  function launchConfetti(){
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var colors = ['var(--coral)','var(--gold)','var(--teal)','var(--mint)'];
    for(var i=0;i<28;i++){
      var piece = document.createElement('span');
      piece.className = 'confetti-piece';
      piece.style.background = colors[i % colors.length];
      piece.style.left = (Math.random()*100) + '%';
      piece.style.animationDelay = (Math.random()*0.3) + 's';
      piece.style.transform = 'rotate(' + (Math.random()*360) + 'deg)';
      confettiLayerEl.appendChild(piece);
    }
    setTimeout(function(){ confettiLayerEl.innerHTML = ''; }, 2200);
  }

  /* ---------------- Resize handling ---------------- */
  window.addEventListener('resize', debounce(function(){
    if(!puzzleScreenEl.classList.contains('active')) return;
    var newSize = boardEl.clientWidth;
    if(!newSize) return;
    state.boardSize = newSize;
    state.cellSize = newSize / state.n;
    for(var c=0;c<state.total;c++){
      positionPiece(state.pieceEls[state.boardState[c]], c, false);
    }
  }, 130));

  /* ---------------- Init ---------------- */
  buildDifficultyChips();
  renderLeaderboard(introLeaderboardListEl);
  initCamera();

  window.addEventListener('beforeunload', stopCameraStream);

})();
</script>
</body>
</html>
