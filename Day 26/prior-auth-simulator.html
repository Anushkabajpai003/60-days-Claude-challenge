<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prior Authorization — Slide Simulator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue-50:#e6f1fb; --blue-100:#b5d4f4; --blue-200:#85b7eb;
  --blue-400:#378add; --blue-600:#185fa5; --blue-800:#0c447c; --blue-900:#042c53;
  --green-50:#eaf3de; --green-100:#c0dd97; --green-400:#639922;
  --green-600:#3b6d11; --green-800:#27500a;
  --amber-50:#faeeda; --amber-100:#fac775; --amber-400:#ba7517;
  --amber-600:#854f0b; --amber-800:#633806;
  --red-50:#fcebeb; --red-100:#f7c1c1; --red-400:#e24b4a;
  --red-600:#a32d2d; --red-800:#791f1f;
  --purple-50:#eeedfe; --purple-100:#cecbf6; --purple-400:#7f77dd;
  --purple-600:#534ab7; --purple-800:#3c3489;
  --teal-50:#e1f5ee; --teal-100:#9fe1cb; --teal-400:#1d9e75;
  --teal-600:#0f6e56; --teal-800:#085041;
  --gray-50:#f1efe8; --gray-100:#d3d1c7; --gray-200:#b4b2a9;
  --gray-400:#888780; --gray-600:#5f5e5a; --gray-800:#444441; --gray-900:#2c2c2a;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a1628;
  color: #1a1a1a;
  overflow: hidden;
}

/* ── SLIDE STAGE ── */
#stage {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transform: translateX(60px);
  transition: opacity 0.42s cubic-bezier(.4,0,.2,1),
              transform 0.42s cubic-bezier(.4,0,.2,1);
}

.slide.active {
  opacity: 1;
  pointer-events: all;
  transform: translateX(0);
}

.slide.exit-left {
  opacity: 0;
  transform: translateX(-60px);
  transition: opacity 0.32s ease, transform 0.32s ease;
}

/* ── SLIDE CHROME ── */
.slide-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 28px 12px;
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}

.slide-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.slide-logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--blue-400);
}

.slide-counter {
  color: rgba(255,255,255,0.45);
  font-size: 12px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
}

.slide-progress-bar {
  height: 3px;
  background: rgba(255,255,255,0.08);
  position: relative;
  flex-shrink: 0;
}

.slide-progress-fill {
  height: 100%;
  background: var(--blue-400);
  transition: width 0.5s cubic-bezier(.4,0,.2,1);
  border-radius: 0 3px 3px 0;
}

/* ── SLIDE BODY ── */
.slide-body {
  flex: 1;
  display: flex;
  align-items: stretch;
  overflow: hidden;
}

/* ── LEFT PANEL (lane indicator) ── */
.slide-lane {
  width: 220px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 32px 24px;
  gap: 12px;
  background: rgba(255,255,255,0.02);
  border-right: 1px solid rgba(255,255,255,0.06);
}

.lane-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.3);
  border: 1px solid transparent;
  transition: all 0.3s;
}

.lane-pill.active-lane {
  color: #fff;
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
}

.lane-pill.done-lane {
  color: rgba(255,255,255,0.45);
}

.lane-icon-box {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.lp { background: rgba(55,138,221,0.2); }
.lpr { background: rgba(127,119,221,0.2); }
.lpa { background: rgba(29,158,117,0.2); }

.lane-pill.active-lane .lp  { background: var(--blue-600); }
.lane-pill.active-lane .lpr { background: var(--purple-600); }
.lane-pill.active-lane .lpa { background: var(--teal-600); }

.lane-stages {
  margin-top: 4px;
  padding-left: 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.lane-stage-dot {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  padding: 3px 0;
}

.lane-stage-dot.done { color: rgba(255,255,255,0.5); }
.lane-stage-dot.current { color: rgba(255,255,255,0.9); font-weight: 600; }

.dot-indicator {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}

.lane-stage-dot.done .dot-indicator { background: var(--green-400); }
.lane-stage-dot.current .dot-indicator { background: var(--blue-400); box-shadow: 0 0 6px rgba(55,138,221,0.7); }

.divider-lane {
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 8px 0;
}

/* ── MAIN CONTENT AREA ── */
.slide-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 36px 48px 28px;
  overflow-y: auto;
  gap: 20px;
}

.slide-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 20px;
  width: fit-content;
}

.tag-patient  { background: rgba(55,138,221,0.15); color: var(--blue-200); }
.tag-provider { background: rgba(127,119,221,0.15); color: #afa9ec; }
.tag-payer    { background: rgba(29,158,117,0.15);  color: var(--teal-100); }
.tag-outcome  { background: rgba(99,153,34,0.15);   color: var(--green-100); }
.tag-warning  { background: rgba(186,117,23,0.15);  color: var(--amber-100); }
.tag-danger   { background: rgba(226,75,74,0.15);   color: var(--red-100); }

.slide-headline {
  font-size: 34px;
  font-weight: 800;
  color: #fff;
  line-height: 1.18;
  letter-spacing: -0.5px;
}

.slide-headline span {
  color: var(--blue-200);
}

.slide-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.55);
  line-height: 1.6;
  max-width: 560px;
}

/* ── CARDS GRID ── */
.info-grid {
  display: grid;
  gap: 12px;
}

.info-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.info-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.info-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }

.info-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.info-card.highlight {
  background: rgba(55,138,221,0.1);
  border-color: rgba(55,138,221,0.25);
}

.info-card.success-card {
  background: rgba(99,153,34,0.1);
  border-color: rgba(99,153,34,0.25);
}

.info-card.warn-card {
  background: rgba(186,117,23,0.1);
  border-color: rgba(186,117,23,0.25);
}

.info-card.danger-card {
  background: rgba(226,75,74,0.1);
  border-color: rgba(226,75,74,0.25);
}

.info-card.purple-card {
  background: rgba(127,119,221,0.1);
  border-color: rgba(127,119,221,0.25);
}

.info-card.teal-card {
  background: rgba(29,158,117,0.1);
  border-color: rgba(29,158,117,0.25);
}

.card-icon { font-size: 22px; }
.card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
.card-value {
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  line-height: 1.35;
}
.card-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  line-height: 1.4;
}

/* ── FLOW DIAGRAM ── */
.flow-row {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
  row-gap: 12px;
}

.flow-node {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  transition: all 0.3s;
}

.flow-node.active-node {
  background: rgba(55,138,221,0.2);
  border-color: var(--blue-400);
  color: #fff;
  box-shadow: 0 0 16px rgba(55,138,221,0.25);
}

.flow-node.done-node {
  background: rgba(99,153,34,0.15);
  border-color: var(--green-400);
  color: rgba(255,255,255,0.8);
}

.flow-arrow {
  color: rgba(255,255,255,0.2);
  font-size: 18px;
  padding: 0 6px;
  flex-shrink: 0;
}

/* ── CHECKLIST ── */
.check-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.check-item:hover {
  background: rgba(55,138,221,0.08);
  border-color: rgba(55,138,221,0.2);
}

.check-item.checked {
  background: rgba(99,153,34,0.1);
  border-color: rgba(99,153,34,0.3);
}

.check-bubble {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: #fff;
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s;
}

.check-item.checked .check-bubble {
  background: var(--green-600);
  border-color: var(--green-600);
}

.check-text {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  line-height: 1.45;
}

.check-text strong { color: #fff; }

/* ── OUTCOME PICKER ── */
.outcome-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.outcome-btn {
  padding: 16px 18px;
  border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: #fff;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.outcome-btn:hover { transform: translateY(-2px); }

.outcome-btn.approve-btn { border-color: rgba(99,153,34,0.4); }
.outcome-btn.approve-btn:hover { background: rgba(99,153,34,0.12); box-shadow: 0 4px 20px rgba(99,153,34,0.2); }
.outcome-btn.approve-btn.picked { background: rgba(99,153,34,0.2); border-color: var(--green-400); }

.outcome-btn.pend-btn { border-color: rgba(186,117,23,0.4); }
.outcome-btn.pend-btn:hover { background: rgba(186,117,23,0.12); box-shadow: 0 4px 20px rgba(186,117,23,0.2); }
.outcome-btn.pend-btn.picked { background: rgba(186,117,23,0.2); border-color: var(--amber-400); }

.outcome-btn.deny-btn { border-color: rgba(226,75,74,0.4); }
.outcome-btn.deny-btn:hover { background: rgba(226,75,74,0.12); box-shadow: 0 4px 20px rgba(226,75,74,0.2); }
.outcome-btn.deny-btn.picked { background: rgba(226,75,74,0.2); border-color: var(--red-400); }

.outcome-btn.peer-btn { border-color: rgba(29,158,117,0.4); }
.outcome-btn.peer-btn:hover { background: rgba(29,158,117,0.12); box-shadow: 0 4px 20px rgba(29,158,117,0.2); }
.outcome-btn.peer-btn.picked { background: rgba(29,158,117,0.2); border-color: var(--teal-400); }

.ob-icon { font-size: 24px; }
.ob-title { font-size: 14px; font-weight: 700; color: #fff; }
.ob-desc  { font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.4; }

/* ── STATS ROW ── */
.stat-row {
  display: flex;
  gap: 12px;
}

.stat-box {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 14px 16px;
  text-align: center;
}

.stat-num {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.stat-lbl {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

/* ── NECESSITY METER ── */
.meter-wrap {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 18px 20px;
}

.meter-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.meter-title { font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7); }
.meter-value { font-size: 22px; font-weight: 800; color: #fff; }

.meter-bar-bg {
  height: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
}

.meter-bar-fill {
  height: 100%;
  border-radius: 10px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}

.meter-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
}

/* ── TIMELINE ── */
.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.tl-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.tl-item:last-child { border-bottom: none; }

.tl-dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
  margin-top: 2px;
}

.tl-dot.p  { background: var(--blue-600); }
.tl-dot.pr { background: var(--purple-600); }
.tl-dot.pa { background: var(--teal-600); }
.tl-dot.ok { background: var(--green-600); }
.tl-dot.wn { background: var(--amber-600); }
.tl-dot.er { background: var(--red-600); }

.tl-body { flex: 1; }
.tl-step { font-size: 13px; font-weight: 600; color: #fff; }
.tl-detail { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
.tl-day { font-size: 11px; color: rgba(255,255,255,0.25); min-width: 50px; text-align: right; flex-shrink: 0; margin-top: 4px; }

/* ── BOTTOM NAV ── */
.slide-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 70px;
  background: rgba(10,22,40,0.95);
  border-top: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.nav-left, .nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.75);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border-color: rgba(255,255,255,0.25);
}

.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

.nav-btn.primary-nav {
  background: var(--blue-600);
  border-color: var(--blue-600);
  color: #fff;
}

.nav-btn.primary-nav:hover:not(:disabled) {
  background: var(--blue-800);
  border-color: var(--blue-800);
}

.nav-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.nav-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: all 0.25s;
  cursor: pointer;
}

.nav-dot.active {
  width: 20px;
  border-radius: 3px;
  background: var(--blue-400);
}

.nav-dot.done { background: rgba(99,153,34,0.6); }

/* ── SCENARIO SELECTOR (slide 0) ── */
.scenario-pick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.sc-card {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sc-card:hover {
  background: rgba(55,138,221,0.08);
  border-color: rgba(55,138,221,0.3);
  transform: translateY(-2px);
}

.sc-card.selected {
  background: rgba(55,138,221,0.12);
  border-color: var(--blue-400);
  box-shadow: 0 0 20px rgba(55,138,221,0.15);
}

.sc-emoji { font-size: 28px; }
.sc-name  { font-size: 14px; font-weight: 700; color: #fff; }
.sc-proc  { font-size: 12px; color: rgba(255,255,255,0.5); }
.sc-tags  { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.sc-badge {
  font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px;
  background: rgba(55,138,221,0.15);
  color: var(--blue-200);
}

/* ── CELEBRATION ── */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}

.cp {
  position: absolute;
  top: -16px;
  border-radius: 3px;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(105vh) rotateZ(600deg); opacity: 0; }
}

/* ── SUMMARY SLIDE ── */
.summary-hero-icon { font-size: 52px; text-align: center; }
.summary-title { font-size: 30px; font-weight: 800; color: #fff; text-align: center; letter-spacing: -0.4px; }
.summary-sub { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; }

.score-ring {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 4px solid var(--blue-400);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 800; color: #fff;
  margin: 0 auto;
}

/* ── EDU BANNER ── */
.edu-banner {
  background: rgba(55,138,221,0.08);
  border: 1px solid rgba(55,138,221,0.2);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.edu-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.edu-body {}
.edu-title { font-size: 11px; font-weight: 700; color: var(--blue-200); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.edu-text  { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.55; }

/* keyboard shortcut hint */
.kbd-hint {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  gap: 6px;
}

.kbd {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
}

@media (max-width: 700px) {
  .slide-lane { display: none; }
  .slide-content { padding: 24px 20px 20px; }
  .slide-headline { font-size: 24px; }

/* =========================================================
   HELPERS
   ========================================================= */
function meterColor(v) {
  return v >= 80 ? 'var(--green-400)' : v >= 60 ? 'var(--amber-400)' : 'var(--red-400)';
}

function addDays(n) {
  G.days += n;
  G.score = Math.max(0, G.score - n * 3);
}

function addTimeline(step, detail, type) {
  G.timeline.push({ step, detail, day: G.days, type });
}

/* =========================================================
   SLIDE RENDER ENGINE
   ========================================================= */
function renderSlide(index, direction) {
  const stage = document.getElementById('stage');
  const def = G.slides[index];
  if (!def) return;

  // Exit current active slide
  const current = stage.querySelector('.slide.active');
  if (current) {
    current.classList.remove('active');
    current.classList.add('exit-left');
    setTimeout(() => current.remove(), 400);
  }

  // Build new slide
  const el = document.createElement('div');
  el.className = 'slide';
  el.id = 'slide_' + index;

  const isSpecial = ['pick','summary'].includes(def.id);

  el.innerHTML = `
    <div class="slide-topbar">
      <div class="slide-logo">
        <div class="slide-logo-dot"></div>
        PA Workflow Simulator
      </div>
      <div class="slide-counter">${G.scenario ? def.title : 'Scenario selection'} &nbsp;·&nbsp; ${index + 1} / ${G.slides.length}</div>
    </div>
    <div class="slide-progress-bar">
      <div class="slide-progress-fill" style="width:${Math.round((index / Math.max(G.slides.length - 1, 1)) * 100)}%"></div>
    </div>
    <div class="slide-body">
      ${!isSpecial && G.scenario ? buildLanePanel(def.lane) : ''}
      <div class="slide-content">${def.html}</div>
    </div>
  `;

  // Direction: entering from right (default) or left
  if (direction === 'back') {
    el.style.transform = 'translateX(-60px)';
  }

  stage.appendChild(el);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      el.style.transform = '';
      el.classList.add('active');
    });
  });

  updateNav(index);
  G.slideIndex = index;
}

function buildLanePanel(activeLane) {
  const stages = [
    { lane:'patient',  label:'Patient intake',        id:'intro' },
    { lane:'patient',  label:'Clinical check-in',     id:'checkin' },
    { lane:'provider', label:'Medical necessity',     id:'necessity' },
    { lane:'provider', label:'Document collection',   id:'docs' },
    { lane:'provider', label:'PA submission',         id:'submit' },
    { lane:'payer',    label:'Payer review',          id:'review' },
    { lane:'payer',    label:'Decision',              id:'decision' },
  ];
  const currentDef = G.slides[G.slideIndex] || {};

  return `
    <div class="slide-lane">
      ${LANES.map(lane => {
        const laneStages = stages.filter(s => s.lane === lane.id);
        const isActive = activeLane === lane.id;
        const isDone = activeLane === 'payer' && lane.id === 'patient'
                    || activeLane === 'payer' && lane.id === 'provider'
                    || activeLane === 'provider' && lane.id === 'patient';

        return `
          <div class="lane-pill ${isActive ? 'active-lane' : isDone ? 'done-lane' : ''}">
            <div class="lane-icon-box ${lane.cls}">${lane.icon}</div>
            ${lane.label}
          </div>
          ${isActive || isDone ? `
            <div class="lane-stages">
              ${laneStages.map(st => {
                const stIdx = G.slides.findIndex(s => s.id === st.id);
                const isCurrent = G.slides[G.slideIndex]?.id === st.id;
                const isPast = stIdx < G.slideIndex;
                return `
                  <div class="lane-stage-dot ${isCurrent ? 'current' : isPast ? 'done' : ''}">
                    <div class="dot-indicator"></div>
                    ${st.label}
                  </div>
                `;
              }).join('')}
            </div>
          ` : ''}
          ${lane.id !== 'payer' ? '<div class="divider-lane"></div>' : ''}
        `;
      }).join('')}
    </div>
  `;
}

function updateNav(index) {
  const total = G.slides.length;
  document.getElementById('btnBack').disabled = index === 0;
  document.getElementById('btnNext').disabled = index === total - 1;
  document.getElementById('btnRestart').style.opacity = G.scenario ? '1' : '0.4';

  // Dots
  const dots = document.getElementById('navDots');
  dots.innerHTML = '';
  const max = Math.min(total, 12);
  const start = Math.max(0, Math.min(index - 5, total - max));
  for (let i = start; i < start + max; i++) {
    const d = document.createElement('div');
    d.className = 'nav-dot' + (i === index ? ' active' : i < index ? ' done' : '');
    d.onclick = () => navigateTo(i);
    dots.appendChild(d);
  }

  const nextBtn = document.getElementById('btnNext');
  const def = G.slides[index];
  nextBtn.textContent = def?.id === 'decision' ? 'Pick outcome first' : index === total - 2 ? 'View summary →' : 'Next →';
}

/* =========================================================
   NAVIGATION
   ========================================================= */
function navigateTo(index, direction) {
  if (index < 0 || index >= G.slides.length) return;
  G.history.push(G.slideIndex);
  renderSlide(index, direction);
}

function goNext() {
  const def = G.slides[G.slideIndex];

  // Decision slide — require outcome pick
  if (def?.id === 'decision') {
    if (!G.outcome) {
        flashNav();
        return;
    }

    addOutcomeSlides();
    //renderNav();
    navigateTo(G.slideIndex + 1);
    return;
  }

  // Appeal / Peer — check sub-result
  if (def?.id === 'appeal') {
    const success = !!document.getElementById('appealSuccess');
    if (success) {
      G.outcome = 'approved';
      G.score = Math.min(100, G.score + 5);
      addTimeline('Appeal Approved', 'Denial overturned on internal appeal', 'ok');
      insertSlide(G.slideIndex + 1, { id:'approved', lane:'payer', title:'Approved', html: buildApprovalSlide() });
      insertSlide(G.slideIndex + 2, { id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
    } else {
      insertSlide(G.slideIndex + 1, { id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
    }
    navigateTo(G.slideIndex + 1);
    return;
  }

  if (def?.id === 'peer') {
    const success = !!document.getElementById('peerSuccess');
    if (success) {
      G.outcome = 'approved';
      G.score = Math.min(100, G.score + 8);
      addTimeline('P2P — Approved', 'Denial overturned via peer-to-peer review', 'ok');
      insertSlide(G.slideIndex + 1, { id:'approved', lane:'payer', title:'Approved', html: buildApprovalSlide() });
      insertSlide(G.slideIndex + 2, { id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
    } else {
      G.outcome = 'denied';
      addTimeline('P2P Unsuccessful', 'Denial upheld — external review option remains', 'er');
      insertSlide(G.slideIndex + 1, { id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
    }
    navigateTo(G.slideIndex + 1);
    return;
  }

  // Pend slide → go to pend resolved
  if (def?.id === 'pended') {
    insertSlide(G.slideIndex + 1, { id:'pend_resolved', lane:'payer', title:'Pend resolved', html: buildPendResolvedSlide() });
    insertSlide(G.slideIndex + 2, { id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
    navigateTo(G.slideIndex + 1);
    return;
  }

  // Pick slide requires scenario
  if (def?.id === 'pick' && !G.scenario) { flashNav(); return; }

  if (G.slideIndex < G.slides.length - 1) {
    navigateTo(G.slideIndex + 1);
  }
}

function goBack() {
  if (G.slideIndex > 0) navigateTo(G.slideIndex - 1, 'back');
}

function flashNav() {
  const btn = document.getElementById('btnNext');
  btn.style.background = '#a32d2d';
  btn.style.borderColor = '#a32d2d';
  setTimeout(() => { btn.style.background = ''; btn.style.borderColor = ''; }, 600);
}

function insertSlide(at, def) {
  G.slides.splice(at, 0, def);
}

/* =========================================================
   OUTCOME ROUTING
   ========================================================= */
function addOutcomeSlides() {
  const after = G.slideIndex + 1;
  // Remove any existing outcome slides
  while (G.slides.length > after) G.slides.pop();

  if (G.outcome === 'approved') {
    G.score = Math.min(100, G.score + 10);
    addTimeline('PA Approved', `Approved by ${G.scenario.insurance}`, 'ok');
    G.slides.push({ id:'approved', lane:'payer', title:'Approved', html: buildApprovalSlide() });
    setTimeout(() => celebrate(), 300);
  } else if (G.outcome === 'denied') {
    G.score = Math.max(0, G.score - 20);
    G.slides.push({ id:'denied', lane:'payer', title:'Denied', html: buildDenialSlide() });
  } else if (G.outcome === 'pended') {
    G.score = Math.max(0, G.score - 10);
    G.slides.push({ id:'pended', lane:'payer', title:'Pended', html: buildPendSlide() });
  } else if (G.outcome === 'peer') {
    G.slides.push({ id:'peer', lane:'payer', title:'Peer-to-peer', html: buildPeerSlide() });
  }

  if (!['denied','pended','peer'].includes(G.outcome)) {
    G.slides.push({ id:'summary', lane:'none', title:'Summary', html: buildSummarySlide() });
  }
}

window.pickOutcome = function(o, el) {
  G.outcome = o;
  document.querySelectorAll('.outcome-btn').forEach(b => b.classList.remove('picked'));
  el.classList.add('picked');
  document.getElementById('btnNext').textContent = 'Continue →';
  setTimeout(()=>goNext(),250);
  document.getElementById('btnNext').style.background = 'var(--blue-600)';
};

window.goToAppeal = function() {
  insertSlide(G.slideIndex + 1, { id:'appeal', lane:'payer', title:'Appeal', html: buildAppealSlide() });
  navigateTo(G.slideIndex + 1);
};

window.goToPeer = function() {
  insertSlide(G.slideIndex + 1, { id:'peer', lane:'payer', title:'Peer-to-peer', html: buildPeerSlide() });
  navigateTo(G.slideIndex + 1);
};

/* =========================================================
   SCENARIO PICK
   ========================================================= */
window.pickScenario = function(id) {
  G.scenario = SCENARIOS.find(s => s.id === id);
  document.querySelectorAll('.sc-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('sc_' + id)?.classList.add('selected');
  document.getElementById('btnNext').textContent = 'Start case →';

  G.days = 0; G.score = 100; G.timeline = []; G.docsChecked = []; G.outcome = null;
  addTimeline('Case initiated', `${G.scenario.name}: ${G.scenario.procedure}`, 'p');
  buildSlides();
  updateNav(G.slideIndex);
};

/* =========================================================
   CHECKLIST INTERACTIONS
   ========================================================= */
window.toggleNecessity = function(i, pts) {
  const item = document.getElementById('nc_' + i);
  const bubble = document.getElementById('nb_' + i);
  if (!item) return;
  const checked = item.classList.toggle('checked');
  bubble.textContent = checked ? '✓' : '';
  G.necessityScore = Math.max(G.scenario.necessityBase,
    Math.min(100, checked ? G.necessityScore + pts : G.necessityScore - pts));
  const fill = document.getElementById('meterFill');
  const val = document.getElementById('meterVal');
  if (fill) { fill.style.width = G.necessityScore + '%'; fill.style.background = meterColor(G.necessityScore); }
  if (val) val.textContent = G.necessityScore + '%';
};

window.toggleDoc = function(i) {
  const item = document.getElementById('dc_' + i);
  const bubble = document.getElementById('db_' + i);
  if (!item) return;
  const checked = item.classList.toggle('checked');
  bubble.textContent = checked ? '✓' : '';
  if (checked && !G.docsChecked.includes(i)) G.docsChecked.push(i);
  else G.docsChecked = G.docsChecked.filter(x => x !== i);

  const s = G.scenario;
  const fill = document.getElementById('docFill');
  const cnt = document.getElementById('docCount');
  if (fill) fill.style.width = Math.round(G.docsChecked.length / s.docs.length * 100) + '%';
  if (cnt) cnt.textContent = G.docsChecked.length + ' / ' + s.docs.length;
};

/* =========================================================
   CELEBRATION
   ========================================================= */
function celebrate() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#378add','#1d9e75','#7f77dd','#fac775','#5dcaa5','#85b7eb','#c0dd97','#ef9f27'];
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = (Math.random() * 9 + 5) + 'px';
    p.style.height = (Math.random() * 9 + 5) + 'px';
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    p.style.animationDelay = (Math.random() * 0.9) + 's';
    p.style.opacity = '1';
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 4000);
}

/* =========================================================
   RESTART
   ========================================================= */
window.restart = function() {
  G = { scenario:null, slideIndex:0, slides:[], days:0, score:100,
        docsChecked:[], necessityScore:0, outcome:null, timeline:[], history:[] };
  buildSlides();
  document.getElementById('stage').innerHTML = '';
  G.slides = [{ id:'pick', lane:'none', title:'Select patient', html: buildPickSlide() }];
  renderSlide(0);
};

/* =========================================================
   KEYBOARD
   ========================================================= */
document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
  if (e.key === 'ArrowLeft') goBack();
});

/* =========================================================
   BOOT
   ========================================================= */
(function init() {
  buildSlides();
  renderSlide(0);
})();
</script>
</body>
