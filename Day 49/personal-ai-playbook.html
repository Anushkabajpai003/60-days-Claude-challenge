<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Personal AI Playbook</title>
<style>
:root{
  --ink:#14171C; --ink-soft:#2B303A; --paper:#FAFAF8; --paper-raised:#FFFFFF;
  --slate:#5B6472; --slate-soft:#8992A0; --line:#E4E2DC; --line-soft:#EDEBE5;
  --accent:#3457D5; --accent-soft:#EAEEFC; --accent-ink:#1F3AA8;
  --success:#2A9D6F; --success-soft:#E4F5EE;
  --warn:#C97A2B; --warn-soft:#FBEEDF;
  --danger:#C43D3D; --danger-soft:#FBE9E9;
  --radius:10px; --radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(20,23,28,0.06);
  --shadow-md:0 6px 20px rgba(20,23,28,0.08);
  --font-ui:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Helvetica,Arial,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",Consolas,"Roboto Mono",monospace;
  --sidebar-w:236px;
}
[data-theme="dark"]{
  --ink:#F2F1ED; --ink-soft:#D8D6CF; --paper:#15171B; --paper-raised:#1C1F24;
  --slate:#9CA3AF; --slate-soft:#6B7280; --line:#2C2F35; --line-soft:#25282D;
  --accent:#6D8CFF; --accent-soft:#1E2740; --accent-ink:#AEC0FF;
  --success:#4FBF93; --success-soft:#12291F;
  --warn:#E0A059; --warn-soft:#2E2314;
  --danger:#E07171; --danger-soft:#2E1717;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.3);
  --shadow-md:0 8px 24px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-ui); background:var(--paper); color:var(--ink);
  -webkit-font-smoothing:antialiased; overflow:hidden; height:100vh;
  transition:background .2s ease,color .2s ease;
}
button,input,select,textarea{font-family:inherit; color:inherit;}
::selection{background:var(--accent-soft); color:var(--accent-ink);}
::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px; border:2px solid var(--paper);}
::-webkit-scrollbar-track{background:transparent;}

.app{display:flex; height:100vh; width:100vw;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:var(--sidebar-w); flex-shrink:0; background:var(--paper-raised);
  border-right:1px solid var(--line); display:flex; flex-direction:column;
  padding:18px 12px; transition:transform .25s ease, background .2s ease, border-color .2s ease;
}
.brand{display:flex; align-items:center; gap:10px; padding:6px 8px 18px 8px;}
.brand-mark{
  width:30px;height:30px;border-radius:8px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font-mono); font-weight:700; color:white; font-size:14px;
}
.brand-text{display:flex; flex-direction:column; line-height:1.15;}
.brand-text strong{font-size:14px; font-weight:650; letter-spacing:-0.01em;}
.brand-text span{font-size:11px; color:var(--slate);}

.nav-group-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--slate-soft);
  padding:14px 10px 6px 10px; font-weight:650;
}
.nav-item{
  display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px;
  cursor:pointer; font-size:13.5px; font-weight:500; color:var(--ink-soft);
  margin-bottom:2px; border:1px solid transparent; user-select:none;
  transition:background .12s ease, color .12s ease;
}
.nav-item:hover{background:var(--line-soft);}
.nav-item.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:650;}
.nav-item .ic{width:17px; height:17px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
.nav-item .badge{
  margin-left:auto; font-size:10px; background:var(--line-soft); color:var(--slate);
  border-radius:20px; padding:1px 7px; font-weight:650;
}
.nav-item.active .badge{background:rgba(255,255,255,0.6); color:var(--accent-ink);}

.sidebar-foot{margin-top:auto; padding-top:12px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:4px;}
.foot-btn{
  display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:8px;
  cursor:pointer; font-size:12.5px; color:var(--slate); background:none; border:none; text-align:left; width:100%;
}
.foot-btn:hover{background:var(--line-soft); color:var(--ink);}
.foot-btn .ic{width:15px;height:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* ---------- MAIN ---------- */
.main{flex:1; display:flex; flex-direction:column; min-width:0; height:100vh;}
.topbar{
  display:flex; align-items:center; gap:12px; padding:14px 28px; border-bottom:1px solid var(--line);
  background:var(--paper-raised); flex-shrink:0;
}
.hamburger{display:none; background:none;border:none;cursor:pointer;color:var(--ink);padding:4px;}
.topbar-title{font-size:15px; font-weight:650; letter-spacing:-0.01em;}
.topbar-sub{font-size:12px; color:var(--slate); margin-top:1px;}
.topbar-spacer{flex:1;}
.searchbox{
  display:flex; align-items:center; gap:8px; background:var(--paper); border:1px solid var(--line);
  border-radius:8px; padding:7px 10px; width:240px; font-size:12.5px; color:var(--slate);
}
.searchbox input{border:none; outline:none; background:none; width:100%; font-size:12.5px; color:var(--ink);}
.icon-btn{
  width:32px;height:32px; border-radius:8px; border:1px solid var(--line); background:var(--paper);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-soft); flex-shrink:0;
  transition:background .12s ease;
}
.icon-btn:hover{background:var(--line-soft);}
.kbd-hint{font-size:10px; color:var(--slate-soft); border:1px solid var(--line); border-radius:5px; padding:1px 5px; font-family:var(--font-mono); margin-left:6px;}

.content{flex:1; overflow-y:auto; padding:26px 32px 60px 32px;}
.content-inner{max-width:1080px; margin:0 auto;}

/* ---------- EXPLAINER BANNER ---------- */
.explainer{
  background:var(--accent-soft); border:1px solid var(--accent); border-radius:var(--radius-lg);
  padding:16px 18px; margin-bottom:22px; display:flex; gap:14px; align-items:flex-start;
  position:relative; animation:slideIn .3s ease;
}
@keyframes slideIn{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);}}
.explainer-ic{
  width:32px;height:32px; border-radius:8px; background:var(--accent); color:white; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.explainer-body{flex:1;}
.explainer-body h4{margin:0 0 4px 0; font-size:13.5px; font-weight:650; color:var(--accent-ink);}
.explainer-body p{margin:0; font-size:12.8px; line-height:1.55; color:var(--ink-soft);}
.explainer-body p + p{margin-top:6px;}
.explainer-close{
  background:none; border:none; cursor:pointer; color:var(--accent-ink); opacity:0.6; flex-shrink:0;
  width:24px; height:24px; display:flex; align-items:center; justify-content:center; border-radius:6px;
}
.explainer-close:hover{opacity:1; background:rgba(255,255,255,0.4);}

/* ---------- SECTION HEADER ---------- */
.section-head{margin-bottom:20px;}
.section-head h1{font-size:23px; font-weight:700; letter-spacing:-0.02em; margin:0 0 5px 0;}
.section-head p{font-size:13px; color:var(--slate); margin:0; line-height:1.5; max-width:640px;}

/* ---------- STAT CARDS ---------- */
.stat-row{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px;}
.stat-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 16px;
}
.stat-card .n{font-size:22px; font-weight:700; letter-spacing:-0.02em;}
.stat-card .l{font-size:11.5px; color:var(--slate); margin-top:2px;}

/* ---------- WORKFLOW GRID ---------- */
.wf-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px;}
.wf-card{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius-lg);
  padding:16px 16px 14px 16px; cursor:pointer; transition:box-shadow .15s ease, border-color .15s ease, transform .12s ease;
  display:flex; flex-direction:column; gap:10px; position:relative;
}
.wf-card:hover{box-shadow:var(--shadow-md); border-color:var(--slate-soft); transform:translateY(-1px);}
.wf-card-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
.wf-card-icon{
  width:34px;height:34px;border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.wf-fav{background:none; border:none; cursor:pointer; color:var(--line); padding:2px; flex-shrink:0;}
.wf-fav.active{color:var(--warn);}
.wf-fav svg{width:17px;height:17px;}
.wf-card h3{font-size:14.5px; font-weight:650; margin:0; letter-spacing:-0.01em;}
.wf-card .desc{font-size:12px; color:var(--slate); line-height:1.5; margin:0;}
.wf-card-tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:auto;}
.tag{
  font-size:10px; font-weight:650; padding:3px 8px; border-radius:20px; background:var(--line-soft); color:var(--slate);
}
.wf-card-foot{display:flex; align-items:center; gap:8px; margin-top:2px;}
.wf-mini-btn{
  font-size:11px; font-weight:600; border:1px solid var(--line); background:var(--paper); border-radius:7px;
  padding:5px 9px; cursor:pointer; color:var(--ink-soft); display:flex; align-items:center; gap:5px;
}
.wf-mini-btn:hover{background:var(--line-soft);}

/* ---------- EMPTY STATE ---------- */
.empty-state{
  text-align:center; padding:60px 20px; color:var(--slate); border:1.5px dashed var(--line); border-radius:var(--radius-lg);
}
.empty-state .ic{width:38px;height:38px;margin:0 auto 12px auto; color:var(--slate-soft);}
.empty-state h4{font-size:14px; color:var(--ink); margin:0 0 5px 0; font-weight:650;}
.empty-state p{font-size:12.5px; margin:0; max-width:340px; margin:0 auto; line-height:1.5;}

/* ---------- FILTER BAR ---------- */
.filter-bar{display:flex; align-items:center; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
.chip{
  font-size:12px; font-weight:600; padding:6px 12px; border-radius:20px; border:1px solid var(--line);
  background:var(--paper-raised); cursor:pointer; color:var(--ink-soft); user-select:none;
}
.chip:hover{background:var(--line-soft);}
.chip.active{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.filter-spacer{flex:1;}
.sort-select{
  font-size:12px; border:1px solid var(--line); background:var(--paper-raised); border-radius:8px; padding:6px 10px;
  cursor:pointer;
}

/* ---------- MODAL / DETAIL ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(15,17,20,0.5); z-index:100; display:flex; align-items:flex-start;
  justify-content:center; padding:4vh 20px; overflow-y:auto; backdrop-filter:blur(2px);
  animation:fadeIn .15s ease;
}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.modal{
  background:var(--paper-raised); border-radius:var(--radius-lg); width:100%; max-width:760px;
  box-shadow:var(--shadow-md); border:1px solid var(--line); animation:popIn .18s ease; margin-bottom:4vh;
}
@keyframes popIn{from{opacity:0; transform:translateY(10px) scale(0.98);} to{opacity:1; transform:translateY(0) scale(1);}}
.modal-head{
  display:flex; align-items:flex-start; gap:14px; padding:20px 22px; border-bottom:1px solid var(--line);
}
.modal-head-icon{width:38px;height:38px;border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.modal-head-text{flex:1;}
.modal-head-text h2{margin:0 0 4px 0; font-size:17px; font-weight:700; letter-spacing:-0.01em;}
.modal-head-text p{margin:0; font-size:12.5px; color:var(--slate); line-height:1.5;}
.modal-close{background:none;border:none;cursor:pointer;color:var(--slate); width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.modal-close:hover{background:var(--line-soft); color:var(--ink);}
.modal-body{padding:20px 22px; max-height:60vh; overflow-y:auto;}
.modal-foot{display:flex; gap:8px; padding:16px 22px; border-top:1px solid var(--line); justify-content:flex-end;}

.field-label{
  font-size:11.5px; font-weight:650; text-transform:uppercase; letter-spacing:0.05em; color:var(--slate);
  margin:0 0 6px 0; display:flex; align-items:center; gap:6px;
}
.field-block{margin-bottom:18px;}
.var-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.var-row label{font-size:12.5px; color:var(--ink-soft); width:150px; flex-shrink:0; font-weight:550;}
.var-row input, .var-row select{
  flex:1; border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:12.5px; background:var(--paper);
}
.var-row input:focus, .var-row select:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}

.prompt-box{
  background:var(--ink); color:#EDEBE5; font-family:var(--font-mono); font-size:12.3px; line-height:1.65;
  padding:16px 16px; border-radius:10px; white-space:pre-wrap; word-break:break-word; position:relative;
}
[data-theme="dark"] .prompt-box{background:#0D0F12; border:1px solid var(--line);}
.prompt-box .var-hl{background:rgba(52,87,213,0.35); border-radius:3px; padding:0 2px; color:#C7D3FF;}

.copy-btn{
  display:flex; align-items:center; gap:6px; font-size:12px; font-weight:650; border:none; cursor:pointer;
  background:var(--accent); color:white; border-radius:8px; padding:8px 14px;
}
.copy-btn:hover{background:var(--accent-ink);}
.copy-btn.copied{background:var(--success);}
.btn-secondary{
  display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; border:1px solid var(--line); cursor:pointer;
  background:var(--paper); color:var(--ink-soft); border-radius:8px; padding:8px 14px;
}
.btn-secondary:hover{background:var(--line-soft);}
.btn-danger-text{color:var(--danger);}

.example-box{
  border:1px solid var(--line); border-radius:10px; padding:12px 14px; background:var(--paper); margin-top:6px;
}
.example-box .q{font-size:11.5px; color:var(--slate); font-weight:650; margin-bottom:4px;}
.example-box .a{font-size:12.5px; line-height:1.55; color:var(--ink-soft);}

.checklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:7px;}
.checklist li{display:flex; align-items:flex-start; gap:8px; font-size:12.5px; color:var(--ink-soft); line-height:1.5;}
.checklist li svg{width:15px;height:15px; color:var(--success); flex-shrink:0; margin-top:1.5px;}

/* ---------- BUILDER LAYOUT ---------- */
.builder-layout{display:grid; grid-template-columns:340px 1fr; gap:20px; align-items:flex-start;}
.builder-panel{
  background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius-lg); padding:16px;
}
.builder-panel h3{font-size:13px; font-weight:650; margin:0 0 4px 0;}
.builder-panel > p.hint{font-size:11.5px; color:var(--slate); margin:0 0 14px 0; line-height:1.5;}

.block-picker{display:flex; flex-direction:column; gap:8px; margin-bottom:6px;}
.block-option{
  border:1px solid var(--line); border-radius:9px; padding:10px 11px; cursor:pointer; background:var(--paper);
  transition:border-color .12s ease, background .12s ease;
}
.block-option:hover{border-color:var(--accent); background:var(--accent-soft);}
.block-option.added{opacity:0.45; cursor:default;}
.block-option.added:hover{border-color:var(--line); background:var(--paper);}
.block-option-top{display:flex; align-items:center; justify-content:between; gap:8px;}
.block-option-name{font-size:12.5px; font-weight:650; display:flex; align-items:center; gap:7px;}
.block-option-name .dot{width:8px;height:8px;border-radius:50%; flex-shrink:0;}
.block-option-desc{font-size:11px; color:var(--slate); margin-top:4px; line-height:1.45;}
.block-add-ic{margin-left:auto; color:var(--accent); flex-shrink:0;}

.assembled-block{
  border:1px solid var(--line); border-left:4px solid var(--accent); border-radius:9px; margin-bottom:10px;
  background:var(--paper-raised); overflow:hidden;
}
.assembled-block-head{
  display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--paper);
  border-bottom:1px solid var(--line-soft); cursor:grab;
}
.assembled-block-head .name{font-size:12px; font-weight:700; flex:1;}
.assembled-block-head .icb{
  background:none;border:none;cursor:pointer;color:var(--slate); width:22px;height:22px;border-radius:6px;
  display:flex; align-items:center; justify-content:center;
}
.assembled-block-head .icb:hover{background:var(--line-soft); color:var(--danger);}
.assembled-block-desc{font-size:11px; color:var(--slate); padding:7px 12px 0 12px; line-height:1.5;}
.assembled-block-body{padding:9px 12px 12px 12px;}
.assembled-block-body textarea, .assembled-block-body select, .assembled-block-body input{
  width:100%; border:1px solid var(--line); border-radius:7px; padding:8px 9px; font-size:12px;
  background:var(--paper); resize:vertical; font-family:var(--font-ui);
}
.assembled-block-body textarea:focus, .assembled-block-body select:focus, .assembled-block-body input:focus{
  outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);
}

.live-preview-wrap{position:sticky; top:0;}
.preview-toolbar{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.preview-toolbar h3{font-size:13px; font-weight:650; margin:0; flex:1;}

.empty-blocks{
  border:1.5px dashed var(--line); border-radius:10px; padding:30px 16px; text-align:center; color:var(--slate);
  font-size:12px; line-height:1.6;
}

/* ---------- SAVED WORKFLOWS (custom) ---------- */
.my-wf-row{
  display:flex; align-items:center; gap:12px; border:1px solid var(--line); border-radius:10px; padding:12px 14px;
  margin-bottom:10px; background:var(--paper-raised);
}
.my-wf-row .mw-icon{width:32px;height:32px;border-radius:8px;background:var(--accent-soft); color:var(--accent-ink); display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.my-wf-row .mw-info{flex:1; min-width:0;}
.my-wf-row .mw-info h4{margin:0 0 2px 0; font-size:13px; font-weight:650;}
.my-wf-row .mw-info p{margin:0; font-size:11.5px; color:var(--slate); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.my-wf-row .mw-actions{display:flex; gap:6px; flex-shrink:0;}

/* ---------- TOAST ---------- */
.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink);
  color:var(--paper); font-size:12.5px; font-weight:600; padding:10px 18px; border-radius:9px; z-index:300;
  opacity:0; pointer-events:none; transition:all .2s ease; display:flex; align-items:center; gap:8px;
  box-shadow:var(--shadow-md);
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ---------- ONBOARDING ---------- */
.onboard-overlay{
  position:fixed; inset:0; background:rgba(15,17,20,0.6); z-index:500; display:flex; align-items:center;
  justify-content:center; padding:20px; backdrop-filter:blur(3px);
}
.onboard-card{
  background:var(--paper-raised); border-radius:20px; max-width:480px; width:100%; padding:32px 30px;
  box-shadow:var(--shadow-md); text-align:center; border:1px solid var(--line);
}
.onboard-card .om-icon{
  width:52px;height:52px;border-radius:14px;background:var(--accent); color:white; display:flex; align-items:center;
  justify-content:center; margin:0 auto 18px auto;
}
.onboard-card h2{font-size:19px; margin:0 0 8px 0; letter-spacing:-0.01em;}
.onboard-card p{font-size:13px; color:var(--slate); line-height:1.6; margin:0 0 22px 0;}
.onboard-list{text-align:left; display:flex; flex-direction:column; gap:12px; margin-bottom:24px;}
.onboard-list li{display:flex; gap:12px; align-items:flex-start; list-style:none; font-size:12.5px; line-height:1.55; color:var(--ink-soft);}
.onboard-list .num{
  width:22px;height:22px;border-radius:7px; background:var(--accent-soft); color:var(--accent-ink); font-weight:700;
  font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.onboard-cta{
  background:var(--accent); color:white; border:none; border-radius:10px; padding:11px 20px; font-size:13.5px;
  font-weight:650; cursor:pointer; width:100%;
}
.onboard-cta:hover{background:var(--accent-ink);}

/* ---------- KBD PALETTE ---------- */
.kpal-overlay{position:fixed; inset:0; background:rgba(15,17,20,0.4); z-index:400; display:flex; align-items:flex-start; justify-content:center; padding-top:14vh;}
.kpal{background:var(--paper-raised); width:100%; max-width:480px; border-radius:14px; box-shadow:var(--shadow-md); border:1px solid var(--line); overflow:hidden;}
.kpal input{width:100%; border:none; padding:16px 18px; font-size:14px; outline:none; background:var(--paper-raised); color:var(--ink); border-bottom:1px solid var(--line);}
.kpal-list{max-height:320px; overflow-y:auto; padding:6px;}
.kpal-item{padding:9px 12px; border-radius:8px; font-size:12.5px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.kpal-item:hover, .kpal-item.sel{background:var(--accent-soft); color:var(--accent-ink);}

/* ---------- RESPONSIVE ---------- */
@media (max-width:900px){
  .sidebar{position:fixed; z-index:200; height:100vh; transform:translateX(-100%); box-shadow:var(--shadow-md);}
  .sidebar.open{transform:translateX(0);}
  .hamburger{display:flex; align-items:center; justify-content:center;}
  .builder-layout{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .searchbox{display:none;}
  .content{padding:18px 16px 60px 16px;}
}

/* ---------- LOOP BUILDER SPECIFIC ---------- */
.safety-note{
  display:flex; gap:10px; background:var(--warn-soft); border:1px solid var(--warn); border-radius:10px;
  padding:12px 14px; font-size:12px; color:var(--ink-soft); line-height:1.55; margin-top:14px;
}
.safety-note svg{color:var(--warn); flex-shrink:0; width:18px;height:18px;}

.help-modal-body h4{font-size:13px; margin:16px 0 6px 0;}
.help-modal-body h4:first-child{margin-top:0;}
.help-modal-body p{font-size:12.5px; line-height:1.6; color:var(--ink-soft); margin:0 0 4px 0;}

textarea.plain{width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 12px; font-size:12.5px; background:var(--paper); resize:vertical; line-height:1.5;}
textarea.plain:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:var(--accent);}

.small-label{font-size:11px; font-weight:650; color:var(--slate); text-transform:uppercase; letter-spacing:.04em; margin-bottom:5px; display:block;}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
</style>

/* =========================================================
   STATE / STORAGE
========================================================= */
const LS_KEY = 'aiPlaybook.v1';
function loadState(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {
    theme:'light',
    favorites:[],
    customWorkflows:[],
    seenOnboarding:false,
    explainerDismissed:false,
    builderBlocks:[],
    loopConfig:{}
  };
}
let state = loadState();
function saveState(){
  localStorage.setItem(LS_KEY, JSON.stringify(state));
}

const WORKFLOWS = [
  {

    desc:'Give Claude a bug report and your code; get a structured root-cause analysis instead of a guessed patch.',

BUG REPORT:
{BUG_DESC}

RELEVANT CODE / ERROR OUTPUT:
{CODE}

Do the following, in order:
1. Restate the bug in your own words to confirm you understand the symptom vs. the root cause.
2. List 2-4 plausible root causes, ranked by likelihood, with a one-line reason for each.

4. Propose the minimal fix that addresses the root cause (not just the symptom).
5. Note any related risk: could this same bug exist elsewhere in the codebase?

Do not rewrite unrelated code. Do not add speculative features. If you're not confident, say so and ask for the missing piece of context (e.g. a log, a config file) instead of guessing.`,
    best_practices:[
      'Paste the actual error/stack trace, not a paraphrase — exact wording often contains the clue.',

  {

CODE:
{CODE}

Review focus: {FOCUS}
Strictness level: {STRICTNESS}

Structure your review as:
- **Blocking issues** — bugs, correctness problems, or edge cases that must be fixed before merge.

- **Nice-to-have** — optional improvements, not worth blocking on.
- **What's good** — 1-2 things done well (be specific, not generic praise).

    best_practices:[
      'State your strictness level — "nitpicky" for production code, "lenient" for a spike/prototype.',
      'Paste a diff (with +/- markers) when possible so Claude reviews only what changed.',
      'Ask for "blocking vs nice-to-have" separation so you know what actually needs fixing before merge.'
    ],
    example:{q:'A 40-line React component with a missing key prop and an unhandled null case', a:'Claude flags the missing key as blocking (list re-render bugs), the unhandled null as blocking (will throw in prod), suggests extracting a repeated JSX block as should-fix, and praises the clear prop naming.'}

CODE:

1. Identify the operations most likely to dominate runtime (loops, N+1 queries, unnecessary re-renders, blocking I/O, etc.), ranked by likely impact.
2. For each, explain *why* it's slow in plain terms — what's the actual cost (e.g. "O(n²) because of nested lookup", "one DB round trip per row").

    best_practices:[
      'Give real scale numbers (rows, requests/sec) — "slow" means something different at 100 rows vs 10 million.',

/* =========================================================
   ROUTER
========================================================= */
let currentRoute = 'dashboard';
let currentModal = null;

function setRoute(route){
  currentRoute = route;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.route === route);
  });
  render();
  document.querySelector('.content').scrollTop = 0;
  if(window.innerWidth <= 900) closeSidebar();
}

function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); }

/* =========================================================
   RENDER: MAIN DISPATCH
========================================================= */
function render(){
  const inner = document.getElementById('content-inner');
  const titleEl = document.getElementById('topbar-title');
  const subEl = document.getElementById('topbar-sub');

  let html = '';
  if(currentRoute === 'dashboard'){
    titleEl.textContent = 'Dashboard';
    subEl.textContent = 'Your saved AI prompt workflows, at a glance';
    html = renderDashboard();
  } else if(currentRoute.startsWith('cat-')){
    const catKey = currentRoute.replace('cat-','');
    if(catKey === 'mine'){
      titleEl.textContent = 'My Workflows';
      subEl.textContent = 'Workflows you\'ve created or saved yourself';
      html = renderMyWorkflows();
    } else {
      const cat = CATS[catKey];
      titleEl.textContent = cat.label;
      subEl.textContent = categorySubtitle(catKey);
      html = renderCategory(catKey);
    }
  } else if(currentRoute === 'prompt-builder'){
    titleEl.textContent = 'Prompt Builder';
    subEl.textContent = 'Assemble a custom prompt from reusable building blocks, with a live preview';
    html = renderPromptBuilder();
  } else if(currentRoute === 'loop-builder'){
    titleEl.textContent = 'Loop Builder';
    subEl.textContent = 'Turn any prompt into a self-improving, autonomous loop with clear stop conditions';
    html = renderLoopBuilder();
  }

  inner.innerHTML = explainerHTML() + html;
  paintIcons(inner);
  attachDynamicHandlers();
}

function categorySubtitle(key){
  const map = {
    debug:'Prompts for finding bugs, reviewing code, and diagnosing performance issues',
    docs:'Prompts for explaining code, writing documentation, and communicating changes',
    learn:'Prompts for learning new concepts and comparing tools or approaches',
    plan:'Prompts for breaking work into tasks and deciding what to focus on'
  };
  return map[key] || '';
}

/* =========================================================
   EXPLAINER BANNER
========================================================= */
function explainerHTML(){
  if(state.explainerDismissed) return '';
  return `
  <div class="explainer" id="explainer-banner">
    <div class="explainer-ic">${ICONS.help}</div>
    <div class="explainer-body">
      <h4>What is My AI Playbook?</h4>
      <p>This is a personal library of reusable AI prompt workflows, built around how you actually work: debugging, documenting, learning, and planning. Each workflow is a fillable template, not a one-off prompt — fill in the variables, copy the result, and reuse it.</p>
      <p><strong>Prompt Builder</strong> lets you assemble a fully custom prompt from small building blocks (role, objective, constraints, etc). <strong>Loop Builder</strong> turns any prompt into an autonomous loop that keeps improving its own answer until it meets criteria you set.</p>
    </div>
    <button class="explainer-close" id="explainer-close" title="Dismiss">${ICONS.x}</button>
  </div>`;
}

function renderDashboard(){
  const totalBuiltIn = WORKFLOWS.length;
  const totalCustom = state.customWorkflows.length;
  const totalFav = state.favorites.length;
  let html = `
  <div class="section-head">
    <h1>Welcome back</h1>
    <p>A quick view of your workflow library. Pick up where you left off, or jump into a category from the sidebar.</p>
  </div>
  <div class="stat-row">
    <div class="stat-card"><div class="n">${totalBuiltIn}</div><div class="l">Built-in workflows</div></div>
    <div class="stat-card"><div class="n">${totalCustom}</div><div class="l">Your saved workflows</div></div>
    <div class="stat-card"><div class="n">${totalFav}</div><div class="l">Favorites</div></div>
    <div class="stat-card"><div class="n">4</div><div class="l">Categories tailored to you</div></div>
  </div>`;

  if(totalFav > 0){
    html += `<div class="section-head" style="margin-top:8px;"><h1 style="font-size:16px;">Favorites</h1></div>`;
    html += `<div class="wf-grid">` + WORKFLOWS.filter(w=>state.favorites.includes(w.id)).map(cardHTML).join('') + `</div>`;
  }

  html += `<div class="section-head" style="margin-top:${totalFav>0?'30':'8'}px;"><h1 style="font-size:16px;">All workflows</h1><p>Browse by category using the sidebar, or scroll through everything below.</p></div>`;
  html += `<div class="wf-grid">` + WORKFLOWS.map(cardHTML).join('') + '' + state.customWorkflows.map(customCardHTML).join('') + `</div>`;
  return html;
}

/* =========================================================
   RENDER: CATEGORY
========================================================= */
function renderCategory(catKey){
  const cat = CATS[catKey];
  const items = WORKFLOWS.filter(w=>w.cat===catKey);
  let html = `
  <div class="section-head">
    <h1>${cat.label}</h1>
    <p>${categorySubtitle(catKey)}</p>
  </div>
  <div class="filter-bar">
    <div class="chip active" data-filter-scope="cat">All ${items.length}</div>
    <div class="filter-spacer"></div>
  </div>`;
  if(items.length===0){
    html += emptyStateHTML('No workflows yet','Nothing here yet. Try the Prompt Builder to create your own.');
  } else {
    html += `<div class="wf-grid">` + items.map(cardHTML).join('') + `</div>`;
  }
  return html;
}

========================================================= */
function openWorkflowModal(id){
  const w = WORKFLOWS.find(x=>x.id===id);
  if(!w) return;
  const cat = CATS[w.cat];
  const varsState = {};
  w.variables.forEach(v=>varsState[v.key]=v.default);

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.id = 'wf-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <div class="modal-head">
        <div class="modal-head-icon" style="background:${cat.soft}; color:${cat.color};">${ICONS[cat.icon]}</div>
        <div class="modal-head-text">
          <h2>${w.title}</h2>
          <p>${w.desc}</p>
        </div>
        <button class="modal-close" id="wf-modal-close">${ICONS.x}</button>
      </div>
      <div class="modal-body">
        <div class="field-block">
          <div class="field-label">Fill in the variables</div>
          <div id="wf-vars"></div>
        </div>
        <div class="field-block">
          <div class="field-label">Live prompt preview</div>
          <div class="prompt-box" id="wf-preview"></div>
        </div>
        <div class="field-block">
          <div class="field-label">Best practices</div>
          <ul class="checklist">${w.best_practices.map(b=>`<li>${ICONS.check}<span>${b}</span></li>`).join('')}</ul>
        </div>
        <div class="field-block" style="margin-bottom:0;">
          <div class="field-label">Example</div>
          <div class="example-box">
            <div class="q">${w.example.q}</div>
            <div class="a">${w.example.a}</div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-secondary" id="wf-fav-btn">${state.favorites.includes(w.id)?'★ Favorited':'☆ Add to favorites'}</button>
        <button class="copy-btn" id="wf-copy-btn">${ICONS.copy} Copy prompt</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  paintIcons(overlay);

  function renderVars(){
    const varsEl = overlay.querySelector('#wf-vars');
    varsEl.innerHTML = w.variables.map(v=>{
      if(v.type==='select'){
        return `<div class="var-row"><label>${v.label}</label>
          <select data-var="${v.key}">${v.options.map(o=>`<option ${o===varsState[v.key]?'selected':''}>${o}</option>`).join('')}</select></div>`;
      } else if(v.type==='textarea'){
        return `<div class="var-row" style="align-items:flex-start;"><label style="padding-top:7px;">${v.label}</label>
          <textarea data-var="${v.key}" rows="3" style="font-family:var(--font-ui); resize:vertical;">${escapeHTML(varsState[v.key])}</textarea></div>`;
      } else {
        return `<div class="var-row"><label>${v.label}</label>
          <input type="text" data-var="${v.key}" value="${escapeAttr(varsState[v.key])}"></div>`;
      }
    }).join('');
    varsEl.querySelectorAll('[data-var]').forEach(el=>{
      el.addEventListener('input', ()=>{
        varsState[el.dataset.var] = el.value;
        renderPreview();
      });
    });
  }

  function renderPreview(){
    let txt = w.template;
    w.variables.forEach(v=>{
      const val = varsState[v.key] || `[${v.key}]`;
      txt = txt.split(`{${v.key}}`).join(val);
    });
    overlay.querySelector('#wf-preview').textContent = txt;
  }

  renderVars();
  renderPreview();

  overlay.querySelector('#wf-modal-close').onclick = ()=> overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });

  overlay.querySelector('#wf-fav-btn').onclick = (e)=>{
    toggleFavorite(w.id);
    e.target.textContent = state.favorites.includes(w.id) ? '★ Favorited' : '☆ Add to favorites';
  };

  overlay.querySelector('#wf-copy-btn').onclick = (e)=>{
    const text = overlay.querySelector('#wf-preview').textContent;
    copyToClipboard(text, e.target.closest('.copy-btn'));
  };
}

let builderAdded = []; // array of {key, value}

function renderPromptBuilder(){
  const addedKeys = builderAdded.map(b=>b.key);
  const pickerHTML = BLOCK_LIBRARY.map(b=>{
    const isAdded = addedKeys.includes(b.key);
    return `
    <div class="block-option ${isAdded?'added':''}" data-add-block="${isAdded?'':b.key}">
      <div class="block-option-top">
        <div class="block-option-name"><span class="dot" style="background:${b.color};"></span>${b.name}</div>
        ${!isAdded?`<span class="block-add-ic">${ICONS.plus}</span>`:`<span style="margin-left:auto; font-size:10px; color:var(--slate); font-weight:650;">Added</span>`}
      </div>
      <div class="block-option-desc">${b.why}</div>
    </div>`;
  }).join('');

  const assembledHTML = builderAdded.length===0
    ? `<div class="empty-blocks">No blocks added yet.<br>Pick building blocks from the left — each one adds a piece to your prompt (like "Role" or "Constraints"). Your live preview updates on the right as you go.</div>`
    : builderAdded.map((b,i)=>{
      const def = BLOCK_LIBRARY.find(x=>x.key===b.key);
      let fieldHTML = '';
      if(def.fieldType==='select'){
        fieldHTML = `<select data-block-input="${i}">${def.options.map(o=>`<option ${o===b.value?'selected':''}>${o}</option>`).join('')}</select>`;
      } else {
        fieldHTML = `<textarea data-block-input="${i}" rows="2" placeholder="${def.placeholder||''}">${escapeHTML(b.value||'')}</textarea>`;
      }
      return `
      <div class="assembled-block" style="border-left-color:${def.color};" draggable="true" data-block-index="${i}">
        <div class="assembled-block-head">
          <span class="ic" style="color:${def.color};" data-icon="grip"></span>
          <span class="name">${def.name}</span>
          <button class="icb" data-remove-block="${i}" title="Remove">${ICONS.x}</button>
        </div>
        <div class="assembled-block-desc">${def.why}</div>
        <div class="assembled-block-body">${fieldHTML}</div>
      </div>`;
    }).join('');

  return `
  <div class="section-head">
    <h1>Prompt Builder</h1>
    <p>Assemble a custom prompt from small, reusable building blocks. Add the blocks you need, fill each one in, and reorder by dragging — the preview on the right updates live and is what you'll actually copy.</p>
  </div>
  <div class="builder-layout">
    <div class="builder-panel">
      <h3>Building blocks</h3>
      <p class="hint">Click a block to add it to your prompt. Every block explains what it does and why it matters, so you never have to guess.</p>
      <div class="block-picker">${pickerHTML}</div>
    </div>
    <div>
      <div class="builder-panel" style="margin-bottom:16px;">
        <h3>Your prompt</h3>
        <p class="hint">These are the blocks currently in your prompt, in the order they'll appear. Drag the grip icon to reorder.</p>
        <div id="assembled-blocks">${assembledHTML}</div>
      </div>
      <div class="builder-panel live-preview-wrap">
        <div class="preview-toolbar">
          <h3>Live preview</h3>
          <button class="btn-secondary" id="pb-save" style="padding:6px 11px; font-size:11.5px;">Save as workflow</button>
          <button class="copy-btn" id="pb-copy" style="padding:6px 11px; font-size:11.5px;">${ICONS.copy} Copy</button>
        </div>
        <div class="prompt-box" id="pb-preview">${builderAdded.length===0 ? '// Your assembled prompt will appear here as you add blocks.' : buildPromptText()}</div>
      </div>
    </div>
  </div>`;
}

function buildPromptText(){
  if(builderAdded.length===0) return '';
  return builderAdded.map(b=>{
    const def = BLOCK_LIBRARY.find(x=>x.key===b.key);
    const val = b.value && b.value.trim() ? b.value : `[${def.name.toLowerCase()} not filled in]`;
    return `## ${def.name}\n${val}`;
  }).join('\n\n');
}

function refreshBuilderPreview(){
  const pv = document.getElementById('pb-preview');
  if(pv) pv.textContent = builderAdded.length===0 ? '// Your assembled prompt will appear here as you add blocks.' : buildPromptText();
}

   LOOP BUILDER
========================================================= */
let loopState = {
  basePrompt:'',
  goal:'',
  evalCriteria:'',
  strategy:'Revise and retry with a different approach each iteration',
  maxIterations:'5',
  stopConditions:'',
  safety:'Ask for confirmation before any action that deletes data, spends money, or sends something externally.'
};

function renderLoopBuilder(){
  return `
  <div class="section-head">
    <h1>Loop Builder</h1>
    <p>Turn a normal one-shot prompt into an autonomous loop: the AI attempts a task, evaluates its own result against your criteria, and retries — until it meets your bar or hits a stop condition you define. Useful for tasks like "keep refining this until tests pass" or "iterate on this draft until it meets the checklist."</p>
  </div>

  <div class="builder-panel" style="margin-bottom:16px;">
    <div class="field-label">Base prompt <span style="text-transform:none; font-weight:500; color:var(--slate);">— the task to loop on</span></div>
    <p class="hint" style="margin-bottom:8px;">Paste the normal prompt you'd otherwise run once. This is what the AI will retry and refine across iterations.</p>
    <textarea class="plain" id="loop-base" rows="3" placeholder="e.g. Refactor this function to reduce cyclomatic complexity below 5, without changing its external behavior.">${escapeHTML(loopState.basePrompt)}</textarea>
  </div>

  <div class="builder-panel" style="margin-bottom:16px;">
    <div class="field-label">Goal <span style="text-transform:none; font-weight:500; color:var(--slate);">— what "success" looks like</span></div>
    <p class="hint" style="margin-bottom:8px;">A clear, ideally measurable definition of done. Vague goals ("make it better") lead to loops that never converge or stop arbitrarily.</p>
    <textarea class="plain" id="loop-goal" rows="2" placeholder="e.g. All existing unit tests pass, and cyclomatic complexity is measurably reduced.">${escapeHTML(loopState.goal)}</textarea>
  </div>

  <div class="two-col" style="margin-bottom:16px;">
    <div class="builder-panel">
      <div class="field-label">Evaluation criteria <span style="text-transform:none; font-weight:500; color:var(--slate);">— how each attempt is judged</span></div>
      <p class="hint" style="margin-bottom:8px;">The checklist the AI should score its own output against after each attempt, before deciding whether to retry.</p>
      <textarea class="plain" id="loop-eval" rows="4" placeholder="e.g. 1) No test regressions 2) Function is under 30 lines 3) No new external dependencies">${escapeHTML(loopState.evalCriteria)}</textarea>
    </div>
    <div class="builder-panel">
      <div class="field-label">Improvement strategy <span style="text-transform:none; font-weight:500; color:var(--slate);">— how it should retry</span></div>
      <p class="hint" style="margin-bottom:8px;">What the AI should change between attempts, so retries aren't just random repeats of the same failed approach.</p>
      <select class="plain" id="loop-strategy">
        ${['Revise and retry with a different approach each iteration','Incrementally refine the same approach, fixing one issue at a time','Try 2-3 alternative approaches, then pick the best','Ask a clarifying question if stuck, rather than guessing again'].map(o=>`<option ${o===loopState.strategy?'selected':''}>${o}</option>`).join('')}
      </select>
    </div>
  </div>

  <div class="two-col" style="margin-bottom:16px;">
    <div class="builder-panel">
      <div class="field-label">Stop conditions <span style="text-transform:none; font-weight:500; color:var(--slate);">— when the loop must end</span></div>
      <p class="hint" style="margin-bottom:8px;">Beyond hitting the goal, define hard limits so the loop can't run forever: max attempts, a time box, or "stop and ask me" triggers.</p>
      <textarea class="plain" id="loop-stop" rows="3" placeholder="e.g. Stop after 5 attempts even if not fully passing, and report what's still failing.">${escapeHTML(loopState.stopConditions)}</textarea>
    </div>
    <div class="builder-panel">
      <div class="field-label">Max iterations</div>
      <p class="hint" style="margin-bottom:8px;">A hard numeric ceiling, combined with your stop conditions above, so the loop always terminates.</p>
      <select class="plain" id="loop-maxiter">
        ${['3','5','8','10'].map(o=>`<option ${o===loopState.maxIterations?'selected':''}>${o} iterations</option>`).join('')}
      </select>
      <div class="field-label" style="margin-top:16px;">Safety rules <span style="text-transform:none; font-weight:500; color:var(--slate);">— guardrails on autonomous action</span></div>
      <p class="hint" style="margin-bottom:8px;">Boundaries the AI must respect regardless of the goal — especially important once it's allowed to retry without you reviewing every step.</p>
      <textarea class="plain" id="loop-safety" rows="2">${escapeHTML(loopState.safety)}</textarea>
    </div>
  </div>

  <div class="builder-panel live-preview-wrap">
    <div class="preview-toolbar">
      <h3>Live preview</h3>
      <button class="copy-btn" id="loop-copy" style="padding:6px 11px; font-size:11.5px;">${ICONS.copy} Copy loop prompt</button>
    </div>
    <div class="prompt-box" id="loop-preview">${buildLoopText()}</div>
    <div class="safety-note">
      ${ICONS.warn}
      <span>Autonomous loops can consume a lot of tokens and, if under-constrained, take actions you didn't intend. Always set a max iteration count and review output between runs for anything with real-world side effects (sending messages, deploying code, spending money).</span>
    </div>
  </div>`;
}

function buildLoopText(){
  const base = loopState.basePrompt.trim() || '[your base task/prompt]';
  const goal = loopState.goal.trim() || '[not yet defined]';
  const evalC = loopState.evalCriteria.trim() || '[not yet defined]';
  const stop = loopState.stopConditions.trim() || 'None specified beyond max iterations.';
  const safety = loopState.safety.trim() || 'None specified.';
  return `You are working autonomously in a loop. Follow this process exactly.

TASK:
${base}

GOAL (definition of done):
${goal}

PROCESS FOR EACH ITERATION:
1. Attempt the task (or the next refinement of it).
2. Evaluate your own output against these criteria:
${evalC}
3. If all criteria are met, stop and report the final result along with which criteria passed.
4. If not, apply this improvement strategy before the next attempt: ${loopState.strategy}

LIMITS:
- Maximum ${loopState.maxIterations} iterations.
- Additional stop conditions: ${stop}
- If you hit the iteration limit without meeting the goal, stop and report exactly what still fails and why — do not silently keep retrying or claim success.

SAFETY RULES (always apply, even mid-loop):
${safety}

After each iteration, briefly log: what you tried, what the evaluation found, and what you'll change next — so the process is auditable, not a black box.`;
}

function refreshLoopPreview(){
  const el = document.getElementById('loop-preview');
  if(el) el.textContent = buildLoopText();
}

/* =========================================================
   DYNAMIC HANDLERS (delegated per render)
========================================================= */
function attachDynamicHandlers(){
  // explainer close
  const closeBtn = document.getElementById('explainer-close');
  if(closeBtn) closeBtn.onclick = ()=>{
    state.explainerDismissed = true; saveState(); render();
  };

  // workflow cards open
  document.querySelectorAll('[data-open-workflow]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-fav-toggle]')) return;
      openWorkflowModal(el.dataset.openWorkflow);
    });
  });

  // fav toggle
  document.querySelectorAll('[data-fav-toggle]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      toggleFavorite(el.dataset.favToggle);
      render();
    });
  });

  // custom workflow view/delete
  document.querySelectorAll('[data-view-custom]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      if(e.target.closest('[data-delete-custom]')) return;
      viewCustomModal(el.dataset.viewCustom);
    });
  });
  document.querySelectorAll('[data-delete-custom]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.stopPropagation();
      state.customWorkflows = state.customWorkflows.filter(x=>x.id!==el.dataset.deleteCustom);
      saveState(); updateBadges(); render(); showToast('Workflow deleted');
    });
  });

  // ---- Prompt Builder ----
  document.querySelectorAll('[data-add-block]').forEach(el=>{
    el.addEventListener('click', ()=>{
      const key = el.dataset.addBlock;
      if(!key) return;
      builderAdded.push({key, value:''});
      render();
    });
  });
  document.querySelectorAll('[data-remove-block]').forEach(el=>{
    el.addEventListener('click', ()=>{
      builderAdded.splice(parseInt(el.dataset.removeBlock),1);
      render();
    });
  });
  document.querySelectorAll('[data-block-input]').forEach(el=>{
    el.addEventListener('input', ()=>{
      builderAdded[parseInt(el.dataset.blockInput)].value = el.value;
      refreshBuilderPreview();
    });
  });
  // drag reorder
  let dragFrom = null;
  document.querySelectorAll('[data-block-index]').forEach(el=>{
    el.addEventListener('dragstart', ()=>{ dragFrom = parseInt(el.dataset.blockIndex); el.style.opacity='0.4'; });
    el.addEventListener('dragend', ()=>{ el.style.opacity='1'; });
    el.addEventListener('dragover', (e)=> e.preventDefault());
    el.addEventListener('drop', (e)=>{
      e.preventDefault();
      const to = parseInt(el.dataset.blockIndex);
      if(dragFrom===null || dragFrom===to) return;
      const item = builderAdded.splice(dragFrom,1)[0];
      builderAdded.splice(to,0,item);
      render();
    });
  });
  const pbCopy = document.getElementById('pb-copy');
  if(pbCopy) pbCopy.onclick = ()=> copyToClipboard(buildPromptText(), pbCopy);
  const pbSave = document.getElementById('pb-save');
  if(pbSave) pbSave.onclick = ()=>{
    if(builderAdded.length===0){ showToast('Add at least one block first'); return; }
    const objBlock = builderAdded.find(b=>b.key==='objective');
    const title = (objBlock && objBlock.value) ? objBlock.value.slice(0,48) : 'Custom prompt';
    const id = 'custom-' + Date.now();
    state.customWorkflows.unshift({id, title, preview: buildPromptText().slice(0,90).replace(/\n/g,' '), fullPrompt: buildPromptText()});
    saveState(); updateBadges();
    showToast('Saved to My Workflows');
  };

  // ---- Loop Builder ----
  const loopIds = ['loop-base','loop-goal','loop-eval','loop-strategy','loop-stop','loop-maxiter','loop-safety'];
  const loopMap = {'loop-base':'basePrompt','loop-goal':'goal','loop-eval':'evalCriteria','loop-strategy':'strategy','loop-stop':'stopConditions','loop-maxiter':'maxIterations','loop-safety':'safety'};
  loopIds.forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('input', ()=>{
      let val = el.value;
      if(id==='loop-maxiter') val = val.split(' ')[0];
      loopState[loopMap[id]] = val;
      refreshLoopPreview();
    });
  });
  const loopCopy = document.getElementById('loop-copy');
  if(loopCopy) loopCopy.onclick = ()=> copyToClipboard(buildLoopText(), loopCopy);
}

function escapeHTML(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escapeAttr(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2200);
}

function copyToClipboard(text, btnEl){
  const doCopy = ()=>{
    if(btnEl){
      const orig = btnEl.innerHTML;
      btnEl.innerHTML = ICONS.check + ' Copied';
      btnEl.classList.add('copied');
      setTimeout(()=>{ btnEl.innerHTML = orig; btnEl.classList.remove('copied'); paintIcons(btnEl); }, 1400);
    }
    showToast('Copied to clipboard');
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(doCopy).catch(()=>{
      fallbackCopy(text); doCopy();
    });
  } else {
    fallbackCopy(text); doCopy();
  }
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

  let filtered = renderList('');
  input.focus();
  input.addEventListener('input', ()=>{ sel=0; filtered = renderList(input.value); });
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Escape'){ overlay.remove(); }
    else if(e.key==='ArrowDown'){ e.preventDefault(); sel=Math.min(sel+1, filtered.length-1); renderList(input.value); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); sel=Math.max(sel-1,0); renderList(input.value); }
    else if(e.key==='Enter'){ if(filtered[sel]){ filtered[sel].action(); overlay.remove(); } }
  });
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
}

/* =========================================================
   IMPORT / EXPORT
========================================================= */
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ai-playbook-backup.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Data exported');
}
function importData(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const imported = JSON.parse(e.target.result);
      state = Object.assign(loadState(), imported);
      saveState(); applyTheme(); updateBadges(); render();
      showToast('Data imported');
    }catch(err){
      showToast('Import failed: invalid file');
    }
  };
  reader.readAsText(file);
}

/* =========================================================
   INIT
========================================================= */
function init(){
  paintIcons(document);
  applyTheme();
  updateBadges();

  document.querySelectorAll('.nav-item[data-route]').forEach(el=>{
    el.addEventListener('click', ()=> setRoute(el.dataset.route));
  });
  document.getElementById('btn-theme').addEventListener('click', ()=>{
    state.theme = state.theme==='dark' ? 'light' : 'dark';
    saveState(); applyTheme();
  });
  document.getElementById('btn-help').addEventListener('click', showHelpModal);
  document.getElementById('btn-help-top').addEventListener('click', showHelpModal);
  document.getElementById('btn-export').addEventListener('click', exportData);
  document.getElementById('btn-import').addEventListener('click', ()=> document.getElementById('file-import').click());
  document.getElementById('file-import').addEventListener('change', (e)=>{
    if(e.target.files[0]) importData(e.target.files[0]);
  });
  document.getElementById('btn-shortcuts').addEventListener('click', openKPalette);
  document.getElementById('btn-hamburger').addEventListener('click', ()=>{
    document.getElementById('sidebar').classList.toggle('open');
  });

  const searchInput = document.getElementById('global-search');
  let searchTimer;
  searchInput.addEventListener('input', ()=>{
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=> doGlobalSearch(searchInput.value), 150);
  });

  document.addEventListener('keydown', (e)=>{
    if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){
      e.preventDefault(); openKPalette();
    } else if(e.key==='Escape'){
      const kpal = document.getElementById('kpal-overlay');
      if(kpal) kpal.remove();
    } else if(e.key==='/' && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){
      e.preventDefault(); searchInput.focus();
    }
  });

  setRoute('dashboard');

  if(!state.seenOnboarding){
    setTimeout(showOnboarding, 350);
  }
}
init();
</script>
